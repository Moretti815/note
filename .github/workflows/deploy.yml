name: Trigger Cloudflare Pages Deploy

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'public/index.html'
      - 'public/editor.html'
      - 'public/syntax.toml'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Call Webhook
        run: curl -s -X POST "${{ secrets.CF_DEPLOY_HOOK }}" > /dev/null
