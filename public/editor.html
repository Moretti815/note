<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>内容编辑器</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/fonts/remixicon.min.css" rel="stylesheet">
    <style>
        :root { --text-main: #5c4b51; --text-muted: #ab9ba0; --timeline-accent: #f4c2c2; --card-bg-blur: rgb(255 255 255 / 75%); --rose-ellipsis: #d88c9a; --bg-gradient-start: #fdfbfb; --bg-gradient-end: #f1f3f4; --danger-color: #e5989b; --success-color: #7b9666; --text-deco: rgb(171 155 160 / 60%); --v-height: 100dvh; }
        *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgb(216 140 154 / 20%); border-radius: 4px; transition: background 0.3s ease; }
        ::-webkit-scrollbar-thumb:hover { background: rgb(216 140 154 / 50%); }
        html, body { overscroll-behavior: none; }
        body { margin: 0; top: 0; left: 0; font-family: system-ui, -apple-system, sans-serif; background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%); color: var(--text-main); height: var(--v-height); overflow: hidden; display: flex; flex-direction: column; position: fixed; width: 100%; }
        .toolbar { touch-action: none; display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; background: var(--card-bg-blur); backdrop-filter: blur(12px); border-bottom: 1px solid rgb(255 255 255 / 40%); z-index: 20; flex-shrink: 0; position: relative; }
        .tools-group { display: flex; gap: 1rem; align-items: center; }
        .file-path-display { font-size: 0.85rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 200px; padding: 0.2rem 0.6rem; background: rgb(255 255 255 / 40%); border-radius: 4px; border: 1px dashed rgb(216 140 154 / 30%); }
        .btn { background: transparent; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; padding: 0.4rem; border-radius: 6px; transition: background 0.3s ease, color 0.3s ease; display: flex; align-items: center; gap: 0.4rem; }
        .btn:hover { color: var(--rose-ellipsis); background: rgb(216 140 154 / 10%); }
        .btn.active { color: var(--rose-ellipsis); background: rgb(216 140 154 / 15%); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
        .main-container { flex: 1; display: flex; overflow: hidden; position: relative; }
        .sidebar-wrapper { width: 260px; flex-shrink: 0; background: var(--card-bg-blur); backdrop-filter: blur(12px); border-right: 1px solid rgb(216 140 154 / 40%); display: flex; flex-direction: column; transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), margin-left 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 15; overflow: hidden; }
        .sidebar-wrapper.collapsed { margin-left: -260px; }
        .sidebar-header { padding: 0.8rem 1.2rem; border-bottom: 1px dashed rgb(216 140 154 / 30%); font-size: 0.9rem; color: var(--text-main); display: flex; align-items: center; gap: 0.5rem; font-weight: 500; flex-shrink: 0; }
        .repo-name-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .file-tree-container { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0.8rem 0; font-size: 0.85rem; scrollbar-gutter: stable; }
        details.tree-folder > summary { cursor: pointer; display: flex; align-items: center; justify-content: space-between; padding: 0.35rem 1.2rem; color: var(--text-main); user-select: none; transition: background 0.2s; outline: none; }
        details.tree-folder > summary:hover { background: rgb(216 140 154 / 10%); }
        details.tree-folder > summary::-webkit-details-marker { display: none; }
        details.tree-folder[open] > summary i.ri-arrow-right-s-line { transform: rotate(90deg); transition: transform 0.2s; }
        .summary-content, .file-content { display: flex; align-items: center; gap: 0.4rem; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .tree-actions { display: flex; opacity: 0; pointer-events: none; gap: 0.2rem; flex-shrink: 0; transition: opacity 0.2s; }
        details.tree-folder > summary:hover .tree-actions, .tree-file:hover .tree-actions { opacity: 1; pointer-events: auto; }
        .tree-action-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0.2rem; border-radius: 4px; font-size: 0.95rem; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .tree-action-btn:hover { color: var(--rose-ellipsis); background: rgb(216 140 154 / 20%); }
        .tree-file { position: relative; cursor: pointer; display: flex; align-items: center; justify-content: space-between; padding: 0.35rem 1.2rem; color: var(--text-muted); transition: all 0.2s; }
        .tree-file:hover { background: rgb(216 140 154 / 10%); }
        .tree-file.active { background: rgb(216 140 154 / 5%); color: var(--rose-ellipsis); font-weight: 500; }
        .tree-file.active::after { content: ''; position: absolute; right: 0; top: 50%; transform: translateY(-50%); height: 60%; width: 4px; background: var(--timeline-accent); border-radius: 4px 0 0 4px; }
        .dirty-dot { width: 6px; height: 6px; background: var(--timeline-accent); border-radius: 50%; margin-left: 0.4rem; flex-shrink: 0; }
        .workspace { flex: 1; display: flex; position: relative; overflow: hidden; background: rgb(253 251 251 / 30%); }
        .pane { flex: 1; height: 100%; overflow-y: auto; overflow-x: hidden; scrollbar-gutter: stable; overscroll-behavior-y: none; }
        #editor-pane { display: flex; flex-direction: column; padding: 0; position: relative; }
        .format-bar { display: flex; flex-wrap: wrap; gap: 0.4rem; padding: 0.6rem 1.5rem; background: rgb(253 251 251 / 40%); border-bottom: 1px dashed rgb(216 140 154 / 20%); align-items: center; flex-shrink: 0; position: relative; }
        .fmt-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 0.35rem 0.5rem; border-radius: 4px; transition: background 0.2s, color 0.2s; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .fmt-btn:hover { color: var(--rose-ellipsis); background: rgb(216 140 154 / 10%); }
        .fmt-divider { width: 1px; height: 1.2rem; background: rgb(216 140 154 / 30%); margin: 0 0.4rem; flex-shrink: 0; }
        #editor { width: 100%; flex: 1; resize: none; border: none; background: transparent; color: var(--text-main); font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 1.05rem; line-height: 1.8; outline: none; padding: 1.5rem 2rem; }
        #preview { background: rgb(253 251 251 / 60%); scroll-behavior: smooth; padding: 1.5rem 2rem; display: none; }
        .preview-item { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 2.5rem; }
        .preview-date { font-size: 0.75rem; color: var(--text-muted); letter-spacing: 0.05em; margin-left: 0.2rem; }
        .preview-card { position: relative; background: var(--card-bg-blur); backdrop-filter: blur(12px) saturate(120%); -webkit-backdrop-filter: blur(12px) saturate(120%); border-radius: 8px; border: 1px solid rgb(255 255 255 / 60%); box-shadow: 0 4px 15px rgb(0 0 0 / 2%), inset 0 0 0 1px rgb(255 255 255 / 30%); padding: 1.2rem 1.4rem; line-height: 1.7; font-size: 0.95rem; word-wrap: break-word; }
        .preview-card-id { position: absolute; top: 1.2rem; right: 1.4rem; font-size: 0.75rem; color: var(--text-muted); opacity: 0.3; pointer-events: none; }
        .card-tag { color: var(--rose-ellipsis); margin-inline-end: 0.4rem; display: inline-block; font-size: 0.85rem; }
        .card-link { color: var(--rose-ellipsis); text-decoration: none; border-bottom: 1px dashed rgb(216 140 154 / 40%); transition: all 0.3s ease; padding-bottom: 1px; word-break: break-all; }
        .card-link:hover { border-bottom-color: var(--rose-ellipsis); background: rgb(216 140 154 / 10%); }
        .modal-overlay { position: fixed; inset: 0; background: rgb(253 251 251 / 60%); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 1000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-box { background: var(--card-bg-blur); border: 1px solid rgb(255 255 255 / 80%); border-radius: 12px; padding: 2rem; width: 850px; max-width: 95vw; box-shadow: 0 15px 35px rgb(0 0 0 / 4%), inset 0 0 0 1px rgb(255 255 255 / 50%); display: flex; flex-direction: column; gap: 1.2rem; }
        .modal-box.sm { width: 420px; }
        .modal-input-group { display: flex; flex-direction: column; gap: 0.8rem; }
        .modal-field { width: 100%; padding: 0.8rem 1rem; border: 1px solid rgb(216 140 154 / 30%); border-radius: 6px; background: rgb(255 255 255 / 60%); font-family: inherit; color: var(--text-main); font-size: 0.95rem; outline: none; transition: border-color 0.3s ease, background 0.3s ease; }
        .modal-field:focus { border-color: var(--timeline-accent); background: rgb(255 255 255 / 90%); }
        textarea.modal-field { resize: vertical; min-height: 80px; }
        .commit-layout { display: flex; height: 380px; max-height: 50vh; border: 1px solid rgb(216 140 154 / 30%); border-radius: 6px; overflow: hidden; background: rgb(255 255 255 / 40%); }
        .commit-sidebar { width: 260px; border-right: 1px solid rgb(216 140 154 / 30%); overflow-y: auto; overflow-x: hidden; background: rgb(253 251 251 / 50%); padding: 0.8rem 0; font-size: 0.85rem; }
        .commit-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .commit-file-checkbox { cursor: pointer; accent-color: var(--timeline-accent); width: 14px; height: 14px; margin: 0; flex-shrink: 0; }
        .diff-header { display: flex; justify-content: flex-end; align-items: center; padding: 0.4rem 0.8rem; border-bottom: 1px dashed rgb(216 140 154 / 30%); background: rgb(255 255 255 / 40%); }
        .diff-nav { display: flex; gap: 0.5rem; }
        .diff-nav .btn { padding: 0.2rem; font-size: 1.1rem; }
        .diff-container { flex: 1; position: relative; background: rgb(0 0 0 / 2%); overflow-y: auto; padding: 0.5rem 0; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 0.85rem; line-height: 1.5; scroll-behavior: smooth; }
        .diff-chunk { border-left: 3px solid var(--timeline-accent); padding-left: 0.5rem; margin: 0.4rem 0; background: rgb(255 255 255 / 40%); border-radius: 0 4px 4px 0; }
        .diff-line { padding: 0.1rem 0.5rem; white-space: pre-wrap; word-break: break-all; }
        .diff-add { background: rgb(181 201 154 / 25%); color: #4a5d3c; }
        .diff-remove { background: rgb(229 152 155 / 20%); color: #9c4b4e; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 1rem; margin-top: 0.5rem; }
        .btn-solid { background: var(--timeline-accent); color: #fff; padding: 0.6rem 1.5rem; border-radius: 6px; border: none; cursor: pointer; font-size: 0.95rem; font-family: inherit; transition: opacity 0.3s ease, box-shadow 0.3s ease; box-shadow: 0 4px 10px rgb(244 194 194 / 30%); }
        .btn-solid:hover { opacity: 0.9; box-shadow: 0 6px 15px rgb(244 194 194 / 40%); }
        .bottom-area { position: relative; flex-shrink: 0; touch-action: none; z-index: 20; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 0.4rem 1.5rem; padding-bottom: max(0.4rem, env(safe-area-inset-bottom)); background: rgb(253 251 251 / 80%); backdrop-filter: blur(12px); border-top: 1px dashed rgb(216 140 154 / 30%); font-size: 0.8rem; color: var(--text-muted); }
        .status-left { display: flex; align-items: center; gap: 0.6rem; cursor: pointer; transition: color 0.2s; padding: 0.2rem 0; flex: 1; min-width: 0; }
        .status-left:hover { color: var(--text-main); }
        .status-indicator { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        #status-msg { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .bg-info { background: var(--text-muted); }
        .bg-success { background: var(--success-color); }
        .bg-error { background: var(--danger-color); }
        @keyframes pulse-indicator { 0% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.8); opacity: 0.5; } }
        .loading-pulse { animation: pulse-indicator 1.2s infinite ease-in-out; background: var(--timeline-accent); }
        .status-right { display: flex; align-items: center; gap: 0.8rem; position: relative; flex-shrink: 0; }
        .format-toggle { background: transparent; border: 1px dashed rgb(216 140 154 / 40%); color: var(--text-muted); font-size: 0.8rem; padding: 0.2rem 0.6rem; border-radius: 4px; cursor: pointer; transition: all 0.2s; white-space: nowrap; display: flex; align-items: center; gap: 0.3rem; }
        .format-toggle:hover { color: var(--rose-ellipsis); border-color: var(--rose-ellipsis); background: rgb(216 140 154 / 10%); }
        .format-menu { position: absolute; bottom: calc(100% + 8px); right: 0; background: var(--card-bg-blur); backdrop-filter: blur(12px); border: 1px solid rgb(255 255 255 / 80%); border-radius: 6px; box-shadow: 0 -4px 15px rgb(0 0 0 / 5%); z-index: 100; min-width: 140px; opacity: 0; visibility: hidden; transition: opacity 0.2s ease, visibility 0.2s ease; display: flex; flex-direction: column; padding: 0.4rem; }
        .format-menu.active { opacity: 1; visibility: visible; }
        .format-item { padding: 0.4rem 0.8rem; font-size: 0.8rem; cursor: pointer; border-radius: 4px; color: var(--text-main); transition: background 0.2s, color 0.2s; display: flex; justify-content: space-between; align-items: center; }
        .format-item:hover { background: rgb(216 140 154 / 15%); color: var(--rose-ellipsis); }
        .format-item.active { color: var(--rose-ellipsis); font-weight: 500; }
        .format-item.active::after { content: '\EB7B'; font-family: 'remixicon'; font-size: 0.9rem; }
        .btn-cancel-sm { padding: 0; font-size: 1.1rem; color: var(--danger-color); display: none; flex-shrink: 0; margin-left: 0.5rem; }
        .console-panel { position: absolute; bottom: 100%; left: 0; width: 450px; max-width: 100vw; height: 350px; background: rgb(253 251 251 / 90%); backdrop-filter: blur(16px); border-top: 1px solid rgb(255 255 255 / 80%); border-right: 1px solid rgb(255 255 255 / 80%); border-radius: 0 12px 0 0; box-shadow: 4px -4px 15px rgb(0 0 0 / 3%); display: flex; flex-direction: column; opacity: 0; visibility: hidden; transition: opacity 0.2s ease, visibility 0.2s ease; z-index: 15; }
        .console-panel.active { opacity: 1; visibility: visible; }
        .console-header { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 1.2rem; border-bottom: 1px dashed rgb(216 140 154 / 20%); font-size: 0.85rem; color: var(--text-main); }
        .console-logs { flex: 1; overflow-y: auto; padding: 0.8rem 0; display: flex; flex-direction: column; }
        .log-item { padding: 0.4rem 1.2rem; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 0.8rem; line-height: 1.5; display: flex; gap: 0.5rem; align-items: flex-start; word-break: break-all; }
        .log-item.type-info { color: var(--text-main); }
        .log-item.type-success { color: #4a5d3c; background: rgb(181 201 154 / 15%); }
        .log-item.type-error { color: #9c4b4e; background: rgb(229 152 155 / 10%); }
        .log-time { color: var(--text-muted); flex-shrink: 0; }
        .tag-dropdown { position: absolute; background: var(--card-bg-blur); backdrop-filter: blur(12px); border: 1px solid rgb(255 255 255 / 80%); border-radius: 6px; box-shadow: 0 4px 15px rgb(0 0 0 / 5%); z-index: 100; max-height: 220px; min-width: 120px; overflow-y: auto; opacity: 0; visibility: hidden; transition: opacity 0.2s ease, visibility 0.2s ease; display: flex; flex-direction: column; padding: 0.4rem; }
        .tag-dropdown.active { opacity: 1; visibility: visible; }
        .tag-item { padding: 0.4rem 0.8rem; font-size: 0.85rem; cursor: pointer; border-radius: 4px; color: var(--text-main); transition: background 0.2s, color 0.2s; }
        .tag-item:hover { background: rgb(216 140 154 / 15%); color: var(--rose-ellipsis); }
        .fmt-dropdown-container { position: relative; display: flex; align-items: center; }
        .dropdown-menu { position: absolute; top: calc(100% + 4px); left: 50%; background: var(--card-bg-blur); backdrop-filter: blur(16px); border: 1px solid rgb(255 255 255 / 80%); border-radius: 8px; box-shadow: 0 8px 25px rgb(0 0 0 / 8%), inset 0 0 0 1px rgb(255 255 255 / 40%); padding: 0.4rem; z-index: 100; display: flex; gap: 0.3rem; flex-wrap: wrap; width: max-content; max-width: 260px; justify-content: center; opacity: 0; visibility: hidden; transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1); transform: translateX(var(--shift-x, -50%)) translateY(-4px) scale(0.95); transform-origin: top center; }
        .dropdown-menu.active { opacity: 1; visibility: visible; transform: translateX(var(--shift-x, -50%)) translateY(0) scale(1); }
        .sidebar-overlay { display: none; }
        @media (min-width: 769px) { #btn-split { display: none !important; } #editor-pane { width: 50%; flex: none; display: flex; } #preview { width: 50%; flex: none; display: block; border-left: 1px dashed rgb(216 140 154 / 30%); } }
        @media (max-width: 768px) {
            .toolbar { padding: 0.8rem 1rem; }
            #editor-pane { display: flex; flex-direction: column; width: 100%; flex: 1; }
            .format-bar { padding: 0.5rem 1rem; }
            #editor { padding: 1.2rem 1.2rem; }
            #preview { padding: 1.2rem 1.2rem; display: none; width: 100%; flex: 1; }
            .split-mode #editor-pane { display: none; }
            .split-mode #preview { display: block; }
            .sidebar-wrapper { position: absolute; height: 100%; left: 0; transform: translateX(0); margin-left: 0; border-right: 1px solid rgb(216 140 154 / 40%); }
            .sidebar-wrapper.collapsed { transform: translateX(-100%); margin-left: 0; }
            .sidebar-overlay { display: block; position: absolute; inset: 0; background: rgb(253 251 251 / 40%); backdrop-filter: blur(4px); z-index: 10; opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease; }
            .sidebar-overlay.active { opacity: 1; visibility: visible; }
            .file-path-display { display: none; }
            .commit-layout { flex-direction: column; height: auto; max-height: 70vh; }
            .commit-sidebar { width: 100%; border-right: none; border-bottom: 1px solid rgb(216 140 154 / 30%); max-height: 150px; }
            .diff-container { min-height: 150px; }
            .tree-actions { opacity: 1; pointer-events: auto; }
        }
    </style>
</head>
<body>
    <div id="dialog-modal" class="modal-overlay">
        <div class="modal-box sm">
            <div class="modal-input-group">
                <div id="dialog-msg" style="font-size:0.95rem; color:var(--text-main); margin-bottom:0.2rem;"></div>
                <input type="text" id="dialog-input" class="modal-field">
            </div>
            <div class="modal-actions">
                <button class="btn" id="btn-dialog-cancel">取消</button>
                <button class="btn-solid" id="btn-dialog-confirm">确认</button>
            </div>
        </div>
    </div>
    <div id="commit-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-input-group">
                <input type="text" id="commit-title" class="modal-field" placeholder="摘要">
                <textarea id="commit-desc" class="modal-field" placeholder="补充详细描述..."></textarea>
            </div>
            <div class="commit-layout">
                <div class="commit-sidebar" id="commit-file-list"></div>
                <div class="commit-main">
                    <div class="diff-header">
                        <div class="diff-nav">
                            <button class="btn" id="btn-diff-prev" title="上一处"><i class="ri-arrow-up-s-line"></i></button>
                            <button class="btn" id="btn-diff-next" title="下一处"><i class="ri-arrow-down-s-line"></i></button>
                        </div>
                    </div>
                    <div class="diff-container" id="diff-view"></div>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn" id="btn-commit-cancel">取消</button>
                <button class="btn-solid" id="btn-commit-confirm">提交</button>
            </div>
        </div>
    </div>
    <div id="upload-modal" class="modal-overlay">
        <div class="modal-box sm">
            <div id="upload-input-group" class="modal-input-group">
                <input type="text" id="upload-path" class="modal-field" placeholder="文件路径">
            </div>
            <div class="modal-actions">
                <button class="btn" id="btn-upload-cancel">取消</button>
                <button class="btn-solid" id="btn-upload-confirm">上传</button>
            </div>
        </div>
    </div>
    <div class="toolbar">
        <div class="tools-group">
            <button class="btn" id="btn-back" title="返回"><i class="ri-arrow-left-line"></i></button>
            <button class="btn" id="btn-sidebar" title="资源管理器"><i class="ri-folder-3-line"></i></button>
            <div class="file-path-display" id="current-file-path">未选择文件</div>
        </div>
        <div class="tools-group">
            <button class="btn" id="btn-split" title="预览切换"><i class="ri-layout-column-line"></i></button>
        </div>
    </div>
    <div class="main-container">
        <div class="sidebar-wrapper" id="sidebar">
            <div class="sidebar-header">
                <i class="ri-git-repository-line"></i> <span class="repo-name-label" id="repo-name-display">初始化中...</span>
                <div style="display:flex; gap:0.2rem;">
                    <button class="btn" style="padding:0.2rem" id="btn-new-root" title="新建"><i class="ri-add-line"></i></button>
                    <button class="btn" style="padding:0.2rem" id="btn-save" title="提交变更"><i class="ri-save-3-line"></i></button>
                </div>
            </div>
            <div class="file-tree-container" id="file-tree"></div>
        </div>
        <div class="sidebar-overlay active" id="sidebar-overlay"></div>
        <div class="workspace" id="workspace">
            <div class="pane" id="editor-pane">
                <div class="format-bar">
                    <button class="fmt-btn" id="btn-undo" title="撤销"><i class="ri-arrow-go-back-line"></i></button>
                    <button class="fmt-btn" id="btn-redo" title="重做"><i class="ri-arrow-go-forward-line"></i></button>
                    <div class="fmt-divider"></div>
                    <div id="dynamic-fmt-btns" style="display:contents;"></div>
                    <div class="fmt-divider"></div>
                    <button class="fmt-btn fmt-action" data-type="link" data-prefix="[" data-suffix="]()" title="链接"><i class="ri-link"></i></button>
                    <button class="fmt-btn fmt-action" data-type="link" data-prefix="![" data-suffix="]()" title="图片"><i class="ri-image-line"></i></button>
                    <button class="fmt-btn" id="btn-upload-img" title="上传图片"><i class="ri-image-add-line"></i></button>
                    <input type="file" id="file-upload-input" accept="image/*" style="display: none;">
                    <button class="fmt-btn" id="btn-tag" title="标签"><i class="ri-hashtag"></i></button>
                    <button class="fmt-btn fmt-action" data-type="wrap" data-prefix="---" data-suffix="" title="分割线"><i class="ri-separator"></i></button>
                    <div class="fmt-divider"></div>

                render: (raw, ctx) => {

        };

            }
            confirmDialog(msg) {

            async init() {
                try {

                            const synRes = await fetch(this.sysConfig.syntax_config);

                                const synData = parse(await synRes.text());
                                this.sysConfig.syntaxConfig = synData;
                                this.syntaxRules = synData.rules || [];
                                this.petalParser = new PetalParser(this.syntaxRules);

                                if (this.syntaxRules.length > 0) {
                                    const viewTemplates = (synData.view_templates || []).reduce((a, t) => { const k = t.type || t.id || t.name || Object.keys(t)[0]; const v = t.template || t.html || Object.values(t)[0]; if (k) a[k] = v; return a; }, {});
                                    const mg = synData.merge_groups, mergeMap = Array.isArray(mg) ? mg.reduce((a, g) => { const k = g.id || g.group || g.name || Object.keys(g)[0]; if (k) a[k] = g; return a; }, {}) : (mg || {});
                                    const groups = []; this.syntaxRules.forEach(r => { const last = groups[groups.length - 1]; if (r.group && last && last.id === r.group) last.rules.push(r); else groups.push({ id: r.group, rules: [r] }); });
                                    const getInnerHtml = (type, val) => { const tpl = viewTemplates[type]; if (!tpl) return val || ''; if (typeof val === 'object' && val !== null) { return Object.entries(val).reduce((acc, [k, v]) => acc.replace(new RegExp(`\\{\\{${k}\\}\\}`, 'gi'), String(v)), tpl); } return tpl.replace(/\{\{value\}\}/gi, String(val || '')); };
                                    document.getElementById('dynamic-fmt-btns').innerHTML = groups.map(g => {
                                        if (g.id && g.rules.length > 1) {
                                            const conf = mergeMap[g.id] || { title: g.id, icon_html: '<i class="ri-function-line"></i>' };
                                            const menuHtml = g.rules.map(r => `<button class="fmt-btn fmt-action" style="padding:0.35rem;" data-type="wrap" data-prefix="${r.prefix || ''}" data-suffix="${r.suffix || ''}" title="${r.title || ''}">${getInnerHtml(r.view_type, r.view_value)}</button>`).join('');
                                            return `<div class="fmt-dropdown-container"><button class="fmt-btn fmt-dropdown-toggle" title="${conf.title || ''}">${conf.icon_html || ''}</button><div class="dropdown-menu">${menuHtml}</div></div>`;
                                        }
                                        return g.rules.map(r => `<button class="fmt-btn fmt-action" data-type="wrap" data-prefix="${r.prefix || ''}" data-suffix="${r.suffix || ''}" title="${r.title || ''}">${getInnerHtml(r.view_type, r.view_value)}</button>`).join('');
                                    }).join('');
                                }
                            }
                        } catch(e) {}
                    }
                    if (!this.sysConfig.editor_config) return this.log('系统配置缺少 [editor_config]', 'error');
                    this.log('正在解密鉴权配置...', 'info', true);

                    const raw = (await eRes.text()).trim(), decrypted = await CryptoSys.decrypt(raw, pwd);

                        this.authConfig = parse(decrypted);
                        const reqKeys = ['github_user', 'github_repo', 'github_token', 'commit_user', 'commit_email'];
                        if (reqKeys.some(k => !this.authConfig[k])) return this.log('配置缺少关键字段', 'error');

            }
            updateViewIcon() { const isActive = this.workspace.classList.contains('split-mode'), icon = this.btnSplit.querySelector('i'); window.innerWidth <= 768 ? icon.className = isActive ? 'ri-edit-line' : 'ri-eye-line' : icon.className = 'ri-layout-column-line'; }
            conditionallyUpdatePreview() { if (!this.currentPath) { this.preview.innerHTML = ''; return; } if (this.workspace.classList.contains('split-mode') || window.innerWidth > 768) this.updatePreview(); }
            hasUnsavedChanges() {
                if (this.currentPath && this.vfs[this.currentPath] && !this.vfs[this.currentPath].deleted) this.vfs[this.currentPath].content = this.editor.value;

            }

            resolveRenderer() {

                return this.selectedFormatId === 'auto' ? detectedStrategy : (RenderStrategies.find(s => s.id === this.selectedFormatId) || detectedStrategy);

            updatePreview() {

            resolvePreviewAssets() {
                if (!this.currentPath || !this.authConfig) return;
                const branch = this.sysConfig?.github_branch || 'main', baseRepoUrl = `https://raw.githubusercontent.com/${this.authConfig.github_user}/${this.authConfig.github_repo}/${branch}/`, currentDir = this.currentPath.includes('/') ? this.currentPath.substring(0, this.currentPath.lastIndexOf('/') + 1) : '';

                    const newCommit = await (await fetch(`${api}/commits`, { method: 'POST', headers: h, body: JSON.stringify({ message: commitMsg, tree: tree.sha, parents: [curCommit], author, committer: author }), signal: this.fetchController.signal })).json();
                    this.log('正在更新远端引用...', 'info', true);
                    await fetch(`${api}/refs/heads/${branch}`, { method: 'PATCH', headers: h, body: JSON.stringify({ sha: newCommit.sha }), signal: this.fetchController.signal });
                    Array.from(this.stagedFiles).forEach(path => {
                        if (this.vfs[path].deleted) delete this.vfs[path];
                        else { this.vfs[path].sha = treeNodes.find(n => n.path === path).sha; this.vfs[path].original = this.vfs[path].content; this.vfs[path].isNew = false; }
                    });
                    this.stagedFiles.clear(); this.log('保存成功: 数据已同步', 'success');
                } catch (e) { if (e.name !== 'AbortError') this.log(`保存中断: ${e.message}`, 'error'); }
                finally { this.editor.disabled = false; this.btnSave.disabled = false; this.fetchController = null; this.renderFileTree(); this.checkDirty(); }
            }
        }
        document.addEventListener('DOMContentLoaded', () => new EditorCore());
    </script>
</body>
</html>
