<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>内容编辑器</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/fonts/remixicon.min.css" rel="stylesheet">
    <style>
        :root {
            --text-main: #5c4b51;
            --text-muted: #ab9ba0;
            --timeline-accent: #f4c2c2;
            --card-bg-blur: rgb(255 255 255 / 75%);
            --rose-ellipsis: #d88c9a;
            --bg-gradient-start: #fdfbfb;
            --bg-gradient-end: #f1f3f4;
            --danger-color: #e5989b;
            --success-color: #b5c99a;
            --text-deco: rgb(171 155 160 / 60%);
            --v-height: 100dvh;
        }
        *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgb(216 140 154 / 20%); border-radius: 4px; transition: background 0.3s ease; }
        ::-webkit-scrollbar-thumb:hover { background: rgb(216 140 154 / 50%); }
        html, body { overscroll-behavior: none; }
        body { margin: 0; top: 0; left: 0; font-family: system-ui, -apple-system, sans-serif; background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%); color: var(--text-main); height: var(--v-height); overflow: hidden; display: flex; flex-direction: column; position: fixed; width: 100%; }
        .toolbar { touch-action: none; display: flex; justify-content: space-between; align-items: center; padding: 1rem 1.5rem; background: var(--card-bg-blur); backdrop-filter: blur(12px); border-bottom: 1px solid rgb(255 255 255 / 40%); z-index: 10; flex-shrink: 0; }
        .tools-group { display: flex; gap: 1rem; align-items: center; }
        .btn { background: transparent; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; padding: 0.4rem; border-radius: 6px; transition: background 0.3s ease, color 0.3s ease; display: flex; align-items: center; gap: 0.4rem; }
        .btn span { font-size: 0.85rem; font-family: system-ui, sans-serif; letter-spacing: 0.05em; }
        .btn:hover { color: var(--rose-ellipsis); background: rgb(216 140 154 / 10%); }
        .btn.active { color: var(--rose-ellipsis); background: rgb(216 140 154 / 15%); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; pointer-events: none; }
        .workspace { flex: 1; display: flex; position: relative; overflow: hidden; }
        .pane { flex: 1; height: 100%; overflow-y: auto; overflow-x: hidden; scrollbar-gutter: stable; overscroll-behavior-y: none; }
        #editor-pane { display: flex; flex-direction: column; padding: 0; position: relative; }
        .format-bar { display: flex; flex-wrap: wrap; gap: 0.4rem; padding: 0.6rem 1.5rem; background: rgb(253 251 251 / 40%); border-bottom: 1px dashed rgb(216 140 154 / 20%); align-items: center; flex-shrink: 0; position: relative; }
        .fmt-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 0.35rem 0.5rem; border-radius: 4px; transition: background 0.2s, color 0.2s; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; }
        .fmt-btn:hover { color: var(--rose-ellipsis); background: rgb(216 140 154 / 10%); }
        .fmt-divider { width: 1px; height: 1.2rem; background: rgb(216 140 154 / 30%); margin: 0 0.4rem; flex-shrink: 0; }
        .fmt-text { font-size: 0.9rem; font-weight: 700; font-family: ui-monospace, monospace; color: var(--text-main); }
        .fmt-svg { width: 1.2rem; height: 1.2rem; display: flex; align-items: center; justify-content: center; fill: currentColor; }
        .fmt-b64 { width: 1.1rem; height: 1.1rem; object-fit: contain; pointer-events: none; }
        #editor { width: 100%; flex: 1; resize: none; border: none; background: transparent; color: var(--text-main); font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: 1.05rem; line-height: 1.8; outline: none; padding: 1.5rem 2rem; }
        #preview { background: rgb(253 251 251 / 60%); scroll-behavior: smooth; padding: 1.5rem 2rem; display: none; }
        @media (min-width: 769px) { #btn-split { display: none !important; } #editor-pane { width: 50%; flex: none; display: flex; } #preview { width: 50%; flex: none; display: block; border-left: 1px dashed rgb(216 140 154 / 30%); } }
        @media (max-width: 768px) { .toolbar { padding: 0.8rem 1rem; } #editor-pane { display: flex; flex-direction: column; width: 100%; flex: 1; } .format-bar { padding: 0.5rem 1rem; } #editor { padding: 1.2rem 1.2rem; } #preview { padding: 1.2rem 1.2rem; display: none; width: 100%; flex: 1; } .split-mode #editor-pane { display: none; } .split-mode #preview { display: block; } }
        .preview-item { display: flex; flex-direction: column; gap: 0.6rem; margin-bottom: 2.5rem; }
        .preview-date { font-size: 0.75rem; color: var(--text-muted); letter-spacing: 0.05em; margin-left: 0.2rem; }
        .preview-card { position: relative; background: var(--card-bg-blur); backdrop-filter: blur(12px) saturate(120%); -webkit-backdrop-filter: blur(12px) saturate(120%); border-radius: 8px; border: 1px solid rgb(255 255 255 / 60%); box-shadow: 0 4px 15px rgb(0 0 0 / 2%), inset 0 0 0 1px rgb(255 255 255 / 30%); padding: 1.2rem 1.4rem; line-height: 1.7; font-size: 0.95rem; word-wrap: break-word; }
        .preview-card-id { position: absolute; top: 1.2rem; right: 1.4rem; font-size: 0.75rem; color: var(--text-muted); opacity: 0.3; pointer-events: none; }
        .card-tag { color: var(--rose-ellipsis); margin-inline-end: 0.4rem; display: inline-block; font-size: 0.85rem; }
        .card-link { color: var(--rose-ellipsis); text-decoration: none; border-bottom: 1px dashed rgb(216 140 154 / 40%); transition: all 0.3s ease; padding-bottom: 1px; word-break: break-all; }
        .card-link:hover { border-bottom-color: var(--rose-ellipsis); background: rgb(216 140 154 / 10%); }
        .manual-br { height: 0.5em; }
        .card-img { max-width: 100%; height: auto; border-radius: 4px; margin-block: 0.6rem; box-shadow: 0 2px 6px rgb(0 0 0 / 5%); display: block; }
        .gallery { display: grid; gap: 0.4rem; margin-block: 0.6rem; }
        .gallery.grid-2 { grid-template-columns: repeat(2, 1fr); }
        .gallery.grid-3 { grid-template-columns: repeat(3, 1fr); }
        .gallery .card-img { margin: 0; aspect-ratio: 1; object-fit: cover; width: 100%; height: 100%; }
        .modal-overlay { position: fixed; inset: 0; background: rgb(253 251 251 / 60%); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 1000; display: flex; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-box { background: var(--card-bg-blur); border: 1px solid rgb(255 255 255 / 80%); border-radius: 12px; padding: 2rem; width: 680px; max-width: 90vw; box-shadow: 0 15px 35px rgb(0 0 0 / 4%), inset 0 0 0 1px rgb(255 255 255 / 50%); display: flex; flex-direction: column; gap: 1.2rem; }
        .modal-box.sm { width: 420px; }
        .modal-input-group { display: flex; flex-direction: column; gap: 0.8rem; }
        .modal-field { width: 100%; padding: 0.8rem 1rem; border: 1px solid rgb(216 140 154 / 30%); border-radius: 6px; background: rgb(255 255 255 / 60%); font-family: inherit; color: var(--text-main); font-size: 0.95rem; outline: none; transition: border-color 0.3s ease, background 0.3s ease; }
        .modal-field:focus { border-color: var(--timeline-accent); background: rgb(255 255 255 / 90%); }
        textarea.modal-field { resize: vertical; min-height: 80px; }
        .diff-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: -0.5rem; border-bottom: 1px dashed rgb(216 140 154 / 30%); padding-bottom: 0.5rem; }
        .diff-tabs { display: flex; gap: 0.5rem; }
        .diff-tab { padding: 0.3rem 0.8rem; font-size: 0.85rem; color: var(--text-muted); cursor: pointer; border-radius: 4px; transition: all 0.2s; }
        .diff-tab.active { background: rgb(216 140 154 / 15%); color: var(--rose-ellipsis); }
        .diff-nav { display: flex; gap: 0.5rem; }
        .diff-nav .btn { padding: 0.2rem; font-size: 1.2rem; }
        .diff-container { position: relative; border-radius: 6px; background: rgb(0 0 0 / 2%); border: 1px solid rgb(0 0 0 / 5%); max-height: 280px; overflow-y: auto; padding: 0.5rem 0; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 0.85rem; line-height: 1.5; scroll-behavior: smooth; }
        .diff-chunk { border-left: 3px solid var(--timeline-accent); padding-left: 0.5rem; margin: 0.4rem 0; background: rgb(255 255 255 / 40%); border-radius: 0 4px 4px 0; }
        .diff-line { padding: 0.1rem 0.5rem; white-space: pre-wrap; word-break: break-all; }
        .diff-add { background: rgb(181 201 154 / 25%); color: #4a5d3c; }
        .diff-remove { background: rgb(229 152 155 / 20%); color: #9c4b4e; }
        .modal-actions { display: flex; justify-content: flex-end; gap: 1rem; margin-top: 0.5rem; }
        .btn-solid { background: var(--timeline-accent); color: #fff; padding: 0.6rem 1.5rem; border-radius: 6px; border: none; cursor: pointer; font-size: 0.95rem; font-family: inherit; transition: opacity 0.3s ease, box-shadow 0.3s ease; box-shadow: 0 4px 10px rgb(244 194 194 / 30%); }
        .btn-solid:hover { opacity: 0.9; box-shadow: 0 6px 15px rgb(244 194 194 / 40%); }
        .bottom-area { position: relative; flex-shrink: 0; touch-action: none; }
        .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 0.4rem 1.5rem; padding-bottom: max(0.4rem, env(safe-area-inset-bottom)); background: rgb(253 251 251 / 80%); backdrop-filter: blur(12px); border-top: 1px dashed rgb(216 140 154 / 30%); font-size: 0.8rem; color: var(--text-muted); z-index: 20; }
        .status-left { display: flex; align-items: center; gap: 0.6rem; cursor: pointer; transition: color 0.2s; padding: 0.2rem 0; flex: 1; min-width: 0; }
        .status-left:hover { color: var(--text-main); }
        .status-indicator { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
        #status-msg { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .bg-info { background: var(--text-muted); }
        .bg-success { background: var(--success-color); }
        .bg-error { background: var(--danger-color); }
        @keyframes pulse-indicator { 0% { transform: scale(0.8); opacity: 0.5; } 50% { transform: scale(1.2); opacity: 1; } 100% { transform: scale(0.8); opacity: 0.5; } }
        .loading-pulse { animation: pulse-indicator 1.2s infinite ease-in-out; background: var(--timeline-accent); }
        .btn-cancel-sm { padding: 0; font-size: 1.1rem; color: var(--danger-color); display: none; flex-shrink: 0; margin-left: 0.5rem; }
        .console-panel { position: absolute; bottom: 100%; left: 0; width: 450px; max-width: 100vw; height: 350px; background: rgb(253 251 251 / 90%); backdrop-filter: blur(16px); border-top: 1px solid rgb(255 255 255 / 80%); border-right: 1px solid rgb(255 255 255 / 80%); border-radius: 0 12px 0 0; box-shadow: 4px -4px 15px rgb(0 0 0 / 3%); display: flex; flex-direction: column; opacity: 0; visibility: hidden; transition: opacity 0.2s ease, visibility 0.2s ease; z-index: 15; }
        .console-panel.active { opacity: 1; visibility: visible; }
        .console-header { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 1.2rem; border-bottom: 1px dashed rgb(216 140 154 / 20%); font-size: 0.85rem; color: var(--text-main); }
        .console-logs { flex: 1; overflow-y: auto; padding: 0.8rem 0; display: flex; flex-direction: column; }
        .log-item { padding: 0.4rem 1.2rem; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 0.8rem; line-height: 1.5; display: flex; gap: 0.5rem; align-items: flex-start; word-break: break-all; }
        .log-item.type-info { color: var(--text-main); }
        .log-item.type-success { color: #4a5d3c; background: rgb(181 201 154 / 15%); }
        .log-item.type-error { color: #9c4b4e; background: rgb(229 152 155 / 10%); }
        .log-time { color: var(--text-muted); flex-shrink: 0; }
        .tag-dropdown { position: absolute; background: var(--card-bg-blur); backdrop-filter: blur(12px); border: 1px solid rgb(255 255 255 / 80%); border-radius: 6px; box-shadow: 0 4px 15px rgb(0 0 0 / 5%); z-index: 100; max-height: 220px; min-width: 120px; overflow-y: auto; opacity: 0; visibility: hidden; transition: opacity 0.2s ease, visibility 0.2s ease; display: flex; flex-direction: column; padding: 0.4rem; }
        .tag-dropdown.active { opacity: 1; visibility: visible; }
        .tag-item { padding: 0.4rem 0.8rem; font-size: 0.85rem; cursor: pointer; border-radius: 4px; color: var(--text-main); transition: background 0.2s, color 0.2s; }
        .tag-item:hover { background: rgb(216 140 154 / 15%); color: var(--rose-ellipsis); }
        .fmt-dropdown-container { position: relative; display: flex; align-items: center; }
        .dropdown-menu { position: absolute; top: calc(100% + 4px); left: 50%; background: var(--card-bg-blur); backdrop-filter: blur(16px); border: 1px solid rgb(255 255 255 / 80%); border-radius: 8px; box-shadow: 0 8px 25px rgb(0 0 0 / 8%), inset 0 0 0 1px rgb(255 255 255 / 40%); padding: 0.4rem; z-index: 100; display: flex; gap: 0.3rem; flex-wrap: wrap; width: max-content; max-width: 260px; justify-content: center; opacity: 0; visibility: hidden; transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1); transform: translateX(var(--shift-x, -50%)) translateY(-4px) scale(0.95); transform-origin: top center; }
        .dropdown-menu.active { opacity: 1; visibility: visible; transform: translateX(var(--shift-x, -50%)) translateY(0) scale(1); }
    </style>
</head>
<body>
    <div id="commit-modal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-input-group">
                <input type="text" id="commit-title" class="modal-field" placeholder="摘要">
                <textarea id="commit-desc" class="modal-field" placeholder="补充详细描述..."></textarea>
            </div>
            <div class="diff-header">
                <div class="diff-tabs" id="diff-tabs">
                    <div class="diff-tab" id="diff-tab-public" data-target="public">Public</div>
                    <div class="diff-tab" id="diff-tab-private" data-target="private">Private</div>
                </div>
                <div class="diff-nav">
                    <button class="btn" id="btn-diff-prev" title="上一处"><i class="ri-arrow-up-s-line"></i></button>
                    <button class="btn" id="btn-diff-next" title="下一处"><i class="ri-arrow-down-s-line"></i></button>
                </div>
            </div>
            <div class="diff-container" id="diff-view-public" style="display: none;"></div>
            <div class="diff-container" id="diff-view-private" style="display: none;"></div>
            <div class="modal-actions">
                <button class="btn" id="btn-commit-cancel">取消</button>
                <button class="btn-solid" id="btn-commit-confirm">保存</button>
            </div>
        </div>
    </div>
    <div id="upload-modal" class="modal-overlay">
        <div class="modal-box sm">
            <div id="upload-input-group" class="modal-input-group">
                <input type="text" id="upload-path" class="modal-field" placeholder="文件路径">
            </div>
            <div class="modal-actions">
                <button class="btn" id="btn-upload-cancel">取消</button>
                <button class="btn-solid" id="btn-upload-confirm">上传</button>
            </div>
        </div>
    </div>
    <div class="toolbar">
        <div class="tools-group">
            <button class="btn" id="btn-back" title="返回"><i class="ri-arrow-left-line"></i></button>
            <button class="btn" id="btn-public" title="公开数据"><span>Public</span></button>
            <button class="btn" id="btn-private" title="私有数据"><span>Private</span></button>
        </div>
        <div class="tools-group">
            <button class="btn" id="btn-split" title="预览切换"><i class="ri-layout-column-line"></i></button>
            <button class="btn" id="btn-save" title="保存"><i class="ri-save-3-line"></i></button>
        </div>
    </div>
    <div class="workspace" id="workspace">
        <div class="pane" id="editor-pane">
            <div class="format-bar">
                <button class="fmt-btn" id="btn-undo" title="撤销"><i class="ri-arrow-go-back-line"></i></button>
                <button class="fmt-btn" id="btn-redo" title="重做"><i class="ri-arrow-go-forward-line"></i></button>
                <div class="fmt-divider"></div>
                <div id="dynamic-fmt-btns" style="display:contents;"></div>
                <div class="fmt-divider"></div>
                <button class="fmt-btn fmt-action" data-type="link" data-prefix="[" data-suffix="]()" title="链接"><i class="ri-link"></i></button>
                <button class="fmt-btn fmt-action" data-type="link" data-prefix="![" data-suffix="]()" title="图片"><i class="ri-image-line"></i></button>
                <button class="fmt-btn" id="btn-upload-img" title="上传图片"><i class="ri-image-add-line"></i></button>
                <input type="file" id="file-upload-input" accept="image/*" style="display: none;">
                <button class="fmt-btn" id="btn-tag" title="标签"><i class="ri-hashtag"></i></button>
                <button class="fmt-btn fmt-action" data-type="wrap" data-prefix="---" data-suffix="" title="分割线"><i class="ri-separator"></i></button>
                <div class="fmt-divider"></div>
                <button class="fmt-btn" id="btn-locate" title="定位预览位置"><i class="ri-crosshair-2-line"></i></button>
            </div>
            <textarea id="editor" spellcheck="false"></textarea>
            <div id="tag-dropdown" class="tag-dropdown"></div>
        </div>
        <div class="pane" id="preview"></div>
    </div>
    <div class="bottom-area">
        <div class="console-panel" id="console-panel">
            <div class="console-header">
                <span>运行日志</span>
                <button class="btn" id="btn-clear-console" title="清空"><i class="ri-delete-bin-line"></i></button>
            </div>
            <div class="console-logs" id="console-logs"></div>
        </div>
        <div class="status-bar" id="status-bar">
            <div class="status-left" id="btn-console-toggle">
                <div class="status-indicator bg-info" id="status-indicator"></div>
                <span id="status-msg">初始化...</span>
            </div>
            <button class="btn btn-cancel-sm" id="btn-cancel" title="取消请求"><i class="ri-close-circle-line"></i></button>
        </div>
    </div>
    <script type="module">
        import { parse } from 'https://esm.sh/smol-toml@1.3.0';
        import { diffLines } from 'https://esm.sh/diff@5.2.0';
        const CryptoSys = {
            async deriveKey(password) {
                const encoder = new TextEncoder();
                const hash = await crypto.subtle.digest('SHA-256', encoder.encode(password));
                return crypto.subtle.importKey('raw', hash, { name: 'AES-GCM' }, false, ['decrypt']);
            },
            async decrypt(base64Data, password) {
                try {
                    const raw = atob(base64Data);
                    const buf = new Uint8Array(raw.length);
                    for (let i = 0; i < raw.length; i++) buf[i] = raw.charCodeAt(i);
                    const iv = buf.slice(0, 12);
                    const data = buf.slice(12);
                    const key = await this.deriveKey(password);
                    const decrypted = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, data);
                    return new TextDecoder().decode(decrypted);
                } catch (e) {
                    return null;
                }
            }
        };
        const Base64 = {
            encode(str) {
                const bytes = new TextEncoder().encode(str);
                let bin = '';
                for (let i = 0; i < bytes.byteLength; i++) bin += String.fromCharCode(bytes[i]);
                return btoa(bin);
            },
            decode(b64) {
                const bin = atob(b64);
                const bytes = new Uint8Array(bin.length);
                for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
                return new TextDecoder().decode(bytes);
            }
        };
        class EditorCore {
            constructor() {
                this.commitModal = document.getElementById('commit-modal');
                this.commitTitle = document.getElementById('commit-title');
                this.commitDesc = document.getElementById('commit-desc');
                this.diffViewPub = document.getElementById('diff-view-public');
                this.diffViewPriv = document.getElementById('diff-view-private');
                this.diffTabs = document.getElementById('diff-tabs');
                this.tabPub = document.getElementById('diff-tab-public');
                this.tabPriv = document.getElementById('diff-tab-private');
                this.uploadModal = document.getElementById('upload-modal');
                this.uploadPath = document.getElementById('upload-path');
                this.editor = document.getElementById('editor');
                this.preview = document.getElementById('preview');
                this.workspace = document.getElementById('workspace');
                this.btnCancel = document.getElementById('btn-cancel');
                this.btnBack = document.getElementById('btn-back');
                this.btnPub = document.getElementById('btn-public');
                this.btnPriv = document.getElementById('btn-private');
                this.btnSplit = document.getElementById('btn-split');
                this.btnSave = document.getElementById('btn-save');
                this.btnTag = document.getElementById('btn-tag');
                this.tagDropdown = document.getElementById('tag-dropdown');
                this.consolePanel = document.getElementById('console-panel');
                this.consoleLogs = document.getElementById('console-logs');
                this.btnConsoleToggle = document.getElementById('btn-console-toggle');
                this.statusMsg = document.getElementById('status-msg');
                this.statusIndicator = document.getElementById('status-indicator');
                this.sysConfig = null;
                this.authConfig = null;
                this.syntaxRules = [];
                this.currentMode = null; 
                this.fetchController = null;
                this.pendingUploadFile = null;
                this.savedSelection = null;
                this.isManualUpload = false;
                this.modesToCommit = [];
                this.activeDiffView = null;
                this.diffNodes = [];
                this.currentDiffIndex = 0;
                this.docs = {
                    public: { content: '', original: '', sha: null, loaded: false },
                    private: { content: '', original: '', sha: null, loaded: false }
                };
                this.init();
                this.initViewportHandler();
            }
            escapeRegExp(str) {
                return str.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
            }
            initViewportHandler() {
                if (window.visualViewport) {
                    const handleViewport = () => {
                        const vh = window.visualViewport.height;
                        document.documentElement.style.setProperty('--v-height', `${vh}px`);
                        if (document.activeElement === this.editor) {
                            this.editor.scrollIntoView({ block: 'nearest' });
                        }
                    };
                    window.visualViewport.addEventListener('resize', handleViewport);
                    window.visualViewport.addEventListener('scroll', handleViewport);
                    handleViewport();
                }
            }
            log(msg, type = 'info', loading = false) {
                const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
                const iconMap = { info: 'ri-information-line', success: 'ri-check-line', error: 'ri-error-warning-line' };
                const logEl = document.createElement('div');
                logEl.className = `log-item type-${type}`;
                logEl.innerHTML = `<span class="log-time">[${time}]</span> <i class="${iconMap[type]}"></i> <span class="log-msg">${msg}</span>`;
                this.consoleLogs.appendChild(logEl);
                this.consoleLogs.scrollTop = this.consoleLogs.scrollHeight;
                this.statusMsg.innerText = msg;
                this.statusIndicator.className = `status-indicator bg-${type}`;
                if (loading) {
                    this.statusIndicator.classList.add('loading-pulse');
                    this.btnCancel.style.display = 'block';
                } else {
                    this.statusIndicator.classList.remove('loading-pulse');
                    this.btnCancel.style.display = 'none';
                }
            }
            async init() {
                try {
                    const pwd = sessionStorage.getItem('editor_pwd');
                    if (!pwd) {
                        window.location.href = 'index.html';
                        return;
                    }
                    this.log('正在加载系统配置...', 'info', true);
                    const res = await fetch('config.toml');
                    if (!res.ok) throw new Error(`config.toml load failed: ${res.status}`);
                    this.sysConfig = parse(await res.text());
                    if (this.sysConfig.syntax_config) {
                        try {
                            const synRes = await fetch(this.sysConfig.syntax_config);
                            if (synRes.ok) {
                                const synData = parse(await synRes.text());
                                this.syntaxRules = synData.rules || [];
                                const mergeMap = new Map();
                                if (synData.merge_groups) {
                                    synData.merge_groups.forEach(mg => {
                                        if (mg.target_type) mergeMap.set(mg.target_type, mg);
                                    });
                                }
                                if (this.syntaxRules.length > 0) {
                                    const style = document.createElement('style');
                                    style.textContent = this.syntaxRules.map(r => r.css).join('\n');
                                    document.head.appendChild(style);
                                    const groups = [];
                                    let currentGroup = null;
                                    this.syntaxRules.forEach(r => {
                                        const type = r.view_type || 'icon_class';
                                        if (currentGroup && currentGroup.type === type && mergeMap.has(type)) {
                                            currentGroup.rules.push(r);
                                        } else {
                                            currentGroup = { type, rules: [r] };
                                            groups.push(currentGroup);
                                        }
                                    });
                                    const getInnerHtml = (type, val) => {
                                        const mg = mergeMap.get(type);
                                        if (mg && mg.item_template) {
                                            let tpl = mg.item_template;
                                            if (typeof val === 'object' && val !== null) {
                                                for (const [k, v] of Object.entries(val)) {
                                                    tpl = tpl.replace(new RegExp(`\\{\\{${k}\\}\\}`, 'gi'), v);
                                                }
                                                return tpl;
                                            }
                                            return tpl.replace(/\{\{value\}\}/gi, val);
                                        }
                                        switch (type) {
                                            case 'text': return `<span class="fmt-text">${val}</span>`;
                                            case 'icon_svg': return `<div class="fmt-svg">${val}</div>`;
                                            case 'icon_base64': return `<img src="${val}" class="fmt-b64" alt="">`;
                                            case 'icon_class': default: return `<i class="${val}"></i>`;
                                        }
                                    };
                                    const btnHtml = groups.map(g => {
                                        const mergeConf = mergeMap.get(g.type);
                                        if (mergeConf && g.rules.length > 1) {
                                            let menuHtml = `<div class="dropdown-menu">`;
                                            g.rules.forEach(r => {
                                                const inner = getInnerHtml(g.type, r.view_value ?? '');
                                                menuHtml += `<button class="fmt-btn fmt-action" style="padding:0.35rem;" data-type="wrap" data-prefix="${r.prefix}" data-suffix="${r.suffix}" title="${r.title}">${inner}</button>`;
                                            });
                                            menuHtml += `</div>`;
                                            return `<div class="fmt-dropdown-container">
                                                        <button class="fmt-btn fmt-dropdown-toggle" title="${mergeConf.title || ''}">${mergeConf.icon_html || ''}</button>
                                                        ${menuHtml}
                                                    </div>`;
                                        } else {
                                            return g.rules.map(r => {
                                                const inner = getInnerHtml(r.view_type || 'icon_class', r.view_value ?? '');
                                                return `<button class="fmt-btn fmt-action" data-type="wrap" data-prefix="${r.prefix}" data-suffix="${r.suffix}" title="${r.title}">${inner}</button>`;
                                            }).join('');
                                        }
                                    }).join('');
                                    document.getElementById('dynamic-fmt-btns').innerHTML = btnHtml;
                                } else {
                                    this.log('语法配置已加载，但未检测到有效的 [rules]，请检查 syntax_config 内容', 'info');
                                }
                            } else {
                                this.log(`语法配置拉取失败 (HTTP ${synRes.status})，请检查 syntax_config 路径`, 'error');
                            }
                        } catch(e) {
                            this.log(`语法配置解析异常: ${e.message}，请确保格式正确`, 'error');
                        }
                    } else {
                        this.log('提示: 未配置 syntax_config，快捷语法已禁用。如需富文本扩展请配置该项', 'info');
                    }
                    if (!this.sysConfig.editor_config) {
                        this.log('系统配置 config.toml 缺少 [editor_config] 字段', 'error');
                        return;
                    }
                    this.log('正在解密鉴权配置...', 'info', true);
                    const eRes = await fetch(this.sysConfig.editor_config);
                    const raw = (await eRes.text()).trim();
                    const decrypted = await CryptoSys.decrypt(raw, pwd);
                    if (decrypted) {
                        this.authConfig = parse(decrypted);
                        const reqKeys = ['github_user', 'github_repo', 'github_token', 'commit_user', 'commit_email'];
                        if (reqKeys.some(k => !this.authConfig[k])) {
                            this.log('配置缺少关键字段，核心功能不可用', 'error');
                            this.editor.disabled = true;
                            return;
                        }
                        if (!this.authConfig.data_path && !this.authConfig.private_path) {
                            this.log('未配置任何数据路径，请检查配置', 'error');
                            this.editor.disabled = true;
                            return;
                        }
                        this.log('配置就绪', 'success');
                        this.updateViewIcon();
                        this.bindEvents();
                        this.bindFormatters();
                        if (this.authConfig.data_path) this.loadTarget('public');
                        else this.loadTarget('private');
                    } else {
                        sessionStorage.removeItem('editor_pwd');
                        window.location.href = 'index.html';
                    }
                } catch (e) {
                    this.log(`初始化失败: ${e.message || '未知错误'}`, 'error');
                }
            }
            updateViewIcon() {
                const isActive = this.workspace.classList.contains('split-mode');
                const icon = this.btnSplit.querySelector('i');
                if (window.innerWidth <= 768) {
                    icon.className = isActive ? 'ri-edit-line' : 'ri-eye-line';

            conditionallyUpdatePreview() {

                    this.updatePreview();
                }
            }
            hasUnsavedChanges() {
                if (this.currentMode) {
                    this.docs[this.currentMode].content = this.editor.value;
                }
                return Object.values(this.docs).some(doc => doc.loaded && doc.content !== doc.original);
            }
            checkDirty() {

            bindFormatters() {
                document.getElementById('btn-undo').addEventListener('click', (e) => {
                    e.preventDefault();

                    e.preventDefault();
                    if (!this.workspace.classList.contains('split-mode') && window.innerWidth <= 768) {
                        this.workspace.classList.add('split-mode');
                        this.updateViewIcon();
                        this.updatePreview();
                    }
                    const textBefore = this.editor.value.substring(0, this.editor.selectionStart);
                    const index = textBefore.split('\n---\n').length - 1;
                    const items = this.preview.querySelectorAll('.preview-item');
                    if (items[index]) {
                        items[index].scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                });
                document.querySelectorAll('.fmt-action').forEach(btn => {
                    btn.addEventListener('click', (e) => {
                        e.preventDefault();
                        const type = btn.dataset.type;
                        const pre = btn.dataset.prefix;
                        const suf = btn.dataset.suffix;
                        const start = this.editor.selectionStart;
                        const end = this.editor.selectionEnd;
                        const selected = this.editor.value.substring(start, end);
                        let replacement = "";
                        if (type === 'wrap' && selected.includes('\n') && pre !== '---') {
                            replacement = selected.split('\n').map(line => {
                                return line.trim().length > 0 ? (pre + line + suf) : line;
                            }).join('\n');
                        } else {
                            replacement = pre + selected + suf;
                        }
                        this.editor.focus();
                        this.editor.setSelectionRange(start, end);
                        if (!document.execCommand('insertText', false, replacement)) {
                            this.editor.setRangeText(replacement, start, end, 'end');
                        }
                        if (type === 'link') {
                            const pos = start + pre.length + selected.length + 2;
                            this.editor.setSelectionRange(pos, pos);
                        } else if (!selected && type === 'wrap' && pre !== '---') {
                            const pos = start + pre.length;
                            this.editor.setSelectionRange(pos, pos);
                        }
                        this.editor.dispatchEvent(new Event('input'));
                    });
                });
            }
            bindEvents() {
                this.btnConsoleToggle.addEventListener('click', () => this.consolePanel.classList.toggle('active'));

                this.preview.addEventListener('click', (e) => {

                                ], { duration: 1500, easing: 'ease-out' });
                            }
                        }
                    }
                });
                this.editor.addEventListener('input', () => {
                    if (this.currentMode) this.docs[this.currentMode].content = this.editor.value;
                    this.conditionallyUpdatePreview();
                    this.checkDirty();

                this.editor.addEventListener('paste', (e) => {
                    const items = (e.clipboardData || window.clipboardData).items;
                    let hasImage = false;
                    for (let i = 0; i < items.length; i++) {
                        if (items[i].type.indexOf('image') !== -1) {
                            e.preventDefault();
                            this.prepareUpload(items[i].getAsFile(), false);

                    }
                    if (!hasImage) setTimeout(() => this.conditionallyUpdatePreview(), 0);

                this.btnSave.addEventListener('click', () => this.showCommitModal());
                document.getElementById('btn-commit-cancel').addEventListener('click', () => this.commitModal.classList.remove('active'));
                document.getElementById('btn-commit-confirm').addEventListener('click', () => this.executeCommit());
                this.tabPub.addEventListener('click', () => this.switchDiffTab('public'));
                this.tabPriv.addEventListener('click', () => this.switchDiffTab('private'));
                document.getElementById('btn-diff-prev').addEventListener('click', () => {
                    if (!this.diffNodes.length) return;
                    this.currentDiffIndex = (this.currentDiffIndex - 1 + this.diffNodes.length) % this.diffNodes.length;

                document.getElementById('btn-diff-next').addEventListener('click', () => {

                document.getElementById('btn-upload-img').addEventListener('click', (e) => {

                document.getElementById('file-upload-input').addEventListener('change', (e) => {

                document.getElementById('btn-upload-cancel').addEventListener('click', () => {
                    this.uploadModal.classList.remove('active');
                    this.pendingUploadFile = null;
                    this.editor.focus();
                    if (this.savedSelection) this.editor.setSelectionRange(this.savedSelection.start, this.savedSelection.end);
                });
                document.getElementById('btn-upload-confirm').addEventListener('click', () => this.executeUpload());
                this.btnTag.addEventListener('click', (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    const start = this.editor.selectionStart;
                    const end = this.editor.selectionEnd;

                        this.editor.setRangeText('#', start, end, 'end');
                    }
                    this.editor.dispatchEvent(new Event('input'));
                    this.showTagDropdown();
                });
                this.tagDropdown.addEventListener('click', (e) => {
                    if (e.target.classList.contains('tag-item')) {

                        this.editor.focus();
                        if (!document.execCommand('insertText', false, tagText + ' ')) {

                            this.editor.setRangeText(tagText + ' ', start, start, 'end');

                        this.editor.dispatchEvent(new Event('input'));
                        this.tagDropdown.classList.remove('active');

                });
                document.addEventListener('click', (e) => {
                    if (!e.target.closest('#tag-dropdown') && !e.target.closest('#btn-tag')) {
                        this.tagDropdown.classList.remove('active');
                    }
                    if (!e.target.closest('#console-panel') && !e.target.closest('#status-bar')) {
                        this.consolePanel.classList.remove('active');
                    }
                    const toggle = e.target.closest('.fmt-dropdown-toggle');
                    document.querySelectorAll('.dropdown-menu').forEach(menu => {
                        if (toggle && toggle.nextElementSibling === menu) return; 
                        menu.classList.remove('active');
                    });
                    if (toggle) {
                        e.preventDefault();
                        const menu = toggle.nextElementSibling;
                        const isActive = menu.classList.contains('active');
                        if (!isActive) {
                            menu.style.setProperty('--shift-x', '-50%'); 
                            const toggleRect = toggle.getBoundingClientRect();
                            const vw = window.innerWidth;
                            const menuWidth = menu.offsetWidth;
                            const expectedLeft = toggleRect.left + (toggleRect.width / 2) - (menuWidth / 2);
                            const expectedRight = expectedLeft + menuWidth;
                            let shift = 0;
                            if (expectedLeft < 5) {
                                shift = 5 - expectedLeft;
                            } else if (expectedRight > vw - 5) {
                                shift = (vw - 5) - expectedRight;
                            }
                            if (shift !== 0) {
                                menu.style.setProperty('--shift-x', `calc(-50% + ${shift}px)`);
                            }
                            menu.classList.add('active');
                        }
                    }
                });
                document.addEventListener('mousedown', (e) => {
                    if (e.target.closest('.fmt-btn') || e.target.closest('.dropdown-menu') || e.target.closest('.tag-item')) {
                        e.preventDefault();
                    }

                        e.returnValue = '';

            }
            showTagDropdown() {
                const tags = new Set();
                const content = this.editor.value;
                if (!content) return;
                const blocks = content.split('\n---\n').map(b => b.trim()).filter(Boolean);
                blocks.forEach(block => {
                    const lines = block.split('\n');
                    if (lines.length >= 2) {
                        const matches = lines[1].match(/#([^\s#]+)/g) || [];
                        matches.forEach(m => tags.add(m.substring(1)));
                    }
                });
                if (tags.size === 0) return;
                this.tagDropdown.innerHTML = Array.from(tags).map(t => `<div class="tag-item" data-tag="${t}">${t}</div>`).join('');
                this.tagDropdown.classList.add('active');
                const rect = this.btnTag.getBoundingClientRect();
                const paneRect = document.getElementById('editor-pane').getBoundingClientRect();
                const dropRect = this.tagDropdown.getBoundingClientRect();
                const vw = window.innerWidth;
                const vh = window.innerHeight;
                let top = rect.bottom - paneRect.top + 5;
                let left = rect.left - paneRect.left;
                if (rect.left + dropRect.width > vw - 5) left = (vw - 5 - dropRect.width) - paneRect.left;
                if (left + paneRect.left < 5) left = 5 - paneRect.left;
                if (rect.bottom + dropRect.height > vh - 5) top = rect.top - paneRect.top - dropRect.height - 5;
                this.tagDropdown.style.top = `${top}px`;
                this.tagDropdown.style.left = `${left}px`;
            }
            switchDiffTab(mode) {
                this.tabPub.classList.toggle('active', mode === 'public');
                this.tabPriv.classList.toggle('active', mode === 'private');
                this.diffViewPub.style.display = mode === 'public' ? 'block' : 'none';
                this.diffViewPriv.style.display = mode === 'private' ? 'block' : 'none';
                this.activeDiffView = mode === 'public' ? this.diffViewPub : this.diffViewPriv;
                this.diffNodes = Array.from(this.activeDiffView.querySelectorAll('.diff-chunk'));
                this.currentDiffIndex = 0;
                if (this.diffNodes.length > 0) setTimeout(() => this.scrollToDiff(0), 50);
            }
            scrollToDiff(index) {
                if (!this.diffNodes[index] || !this.activeDiffView) return;
                this.activeDiffView.scrollTop = this.diffNodes[index].offsetTop - 20;
            }
            prepareUpload(file, isManual = false) {
                if (!this.authConfig.image?.api_url || !this.authConfig.image?.api_key) {
                    this.log('图片上传失败：缺少 api_url 或 api_key 配置', 'error');
                    return;
                }
                this.isManualUpload = isManual;
                this.savedSelection = { start: this.editor.selectionStart, end: this.editor.selectionEnd };
                this.pendingUploadFile = file;
                let ext = 'png';
                if (file.name) {
                    const parts = file.name.split('.');
                    if (parts.length > 1) ext = parts.pop();
                }
                let name = file.name;
                if (!name || name === 'image.png' || name === 'image.jpg') {
                    const now = new Date();
                    name = `${now.getFullYear()}${(now.getMonth()+1).toString().padStart(2,'0')}${now.getDate().toString().padStart(2,'0')}_${now.getTime()}.${ext}`;
                }
                const cleanDir = (this.authConfig.image?.default_dir || 'img').replace(/^\/|\/$/g, '');
                this.uploadPath.value = cleanDir ? `${cleanDir}/${name}` : name;
                this.uploadModal.classList.add('active');
                setTimeout(() => {
                    this.uploadPath.focus();
                    const dotIndex = this.uploadPath.value.lastIndexOf('.');
                    if (dotIndex > -1) {
                        this.uploadPath.setSelectionRange(cleanDir.length ? cleanDir.length + 1 : 0, dotIndex);
                    } else {
                        this.uploadPath.setSelectionRange(this.uploadPath.value.length, this.uploadPath.value.length);
                    }
                }, 100);
            }
            async executeUpload() {
                const path = this.uploadPath.value.trim();
                if (!path) return;
                const domain = (this.authConfig.image?.img_domain || '').replace(/\/$/, '');
                const cleanPath = path.replace(/^\//, '');
                const fullUrl = domain ? `${domain}/${cleanPath}` : cleanPath;
                const insertText = `![${this.pendingUploadFile.name}](${fullUrl})`;
                const fileToUpload = this.pendingUploadFile;
                this.pendingUploadFile = null;
                this.uploadModal.classList.remove('active');
                this.editor.focus();
                if (this.savedSelection) this.editor.setSelectionRange(this.savedSelection.start, this.savedSelection.end);
                if (this.isManualUpload) {
                    navigator.clipboard.writeText(insertText).then(() => {
                        this.log('已提取图片链接并复制到剪贴板', 'success');
                    }).catch(() => this.log('剪贴板写入失败', 'error'));
                } else {
                    if (!document.execCommand('insertText', false, insertText)) {
                        this.editor.setRangeText(insertText, this.editor.selectionStart, this.editor.selectionEnd, 'end');
                    }
                    this.editor.dispatchEvent(new Event('input'));
                }
                this.log(`准备异步上传图片: ${cleanPath}`, 'info', true);
                try {
                    const apiUrl = (this.authConfig.image?.api_url || '').replace(/\/$/, '');
                    const res = await fetch(`${apiUrl}/${cleanPath}`, {
                        method: 'PUT',
                        headers: { 'Authorization': `Bearer ${this.authConfig.image?.api_key}` },
                        body: fileToUpload
                    });
                    if (res.ok) {
                        this.log(`图片上传成功: ${cleanPath} | 远端响应: ${await res.text()}`, 'success');
                    } else {
                        throw new Error(`HTTP Error: ${res.status} | ${await res.text()}`);
                    }
                } catch (e) {
                    this.log(`图片上传失败: ${e.message}`, 'error');
                }
            }
            parseDreamSyntax(raw) {
                const isAsc = this.sysConfig?.data_order === 'asc';
                const blocks = raw.split('\n---\n').map(b => b.trim()).filter(b => b && b.split('\n').length >= 2);
                const total = blocks.length;
                return blocks.map((block, index) => {
                    const id = isAsc ? index + 1 : total - index;
                    const lines = block.split('\n');
                    const date = lines.shift().trim();
                    const imgStore = [], linkStore = [];
                    if (lines.length > 0) {
                        lines[0] = lines[0].replace(/#([^\s#]+)/g, (_, tag) => `<span class="card-tag">#${tag}</span>`);
                    }
                    const processedLines = lines.map(line => {
                        let p = line;
                        p = p.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, (_, alt, url) => {
                            imgStore.push({ alt, url }); return `__IMG_${imgStore.length - 1}__`;
                        });
                        p = p.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, text, url) => {
                            linkStore.push({ text, url }); return `__LNK_${linkStore.length - 1}__`;
                        });
                        p = p.replace(/(https?:\/\/[^\s<]+)/g, (match, url) => {
                            let cleanUrl = url, trailing = '';
                            const matchPunc = url.match(/([.,;:!?。，、！？]+)$/);
                            if (matchPunc) {
                                cleanUrl = url.substring(0, url.length - matchPunc[0].length);
                                trailing = matchPunc[0];
                            }
                            return `<a href="${cleanUrl}" target="_blank" class="card-link" rel="noopener noreferrer">${cleanUrl.replace(/^https?:\/\//, '').replace(/\/$/, '')}</a>${trailing}`;
                        });
                        p = p.replace(/__LNK_(\d+)__/g, (_, idx) => {
                            const { text, url } = linkStore[idx];
                            return `<a href="${url}" ${url.startsWith('#') ? '' : 'target="_blank" rel="noopener noreferrer"'} class="card-link">${text}</a>`;
                        });
                        p = p.replace(/__IMG_(\d+)__/g, (_, idx) => {
                            const { alt, url } = imgStore[idx];
                            return `<img src="${url}" alt="${alt}" class="card-img" loading="lazy" />`;
                        });
                        if (this.syntaxRules && this.syntaxRules.length > 0) {
                            this.syntaxRules.forEach(rule => {
                                const pre = this.escapeRegExp(rule.prefix);
                                const suf = this.escapeRegExp(rule.suffix);
                                const regex = new RegExp(`(?<!\\\\)${pre}(.+?)(?<!\\\\)${suf}`, 'g');
                                p = p.replace(regex, rule.replacement);
                            });
                            const markers = [...new Set(this.syntaxRules.flatMap(r => [r.prefix, r.suffix]))];
                            const escapeRegex = new RegExp(`\\\\(${markers.map(m => this.escapeRegExp(m)).join('|')})`, 'g');
                            p = p.replace(escapeRegex, '$1');
                        }
                        return p;
                    });
                    let finalHtml = processedLines.join('<div class="manual-br"></div>');
                    finalHtml = finalHtml.replace(/(?:<div class="manual-br"><\/div>)*\s*(<img[^>]+>)\s*(?:<div class="manual-br"><\/div>)*/g, '$1');
                    finalHtml = finalHtml.replace(/(<img[^>]+>){2,}/g, match => {
                        const count = (match.match(/<img/g) || []).length;
                        return `<div class="gallery ${(count === 2 || count === 4) ? 'grid-2' : 'grid-3'}">${match}</div>`;
                    });
                    return `<div class="preview-item" id="preview-post-${id}"><div class="preview-date">${date}</div><div class="preview-card"><span class="preview-card-id">#${id}</span>${finalHtml}</div></div>`;
                }).join('');
            }
            updatePreview() {
                this.preview.innerHTML = this.parseDreamSyntax(this.editor.value);
            }
            async loadTarget(mode) {
                if (this.currentMode) this.docs[this.currentMode].content = this.editor.value;
                if (this.fetchController) this.fetchController.abort();
                this.fetchController = new AbortController();
                this.currentMode = mode;
                this.btnPub.classList.toggle('active', mode === 'public');
                this.btnPriv.classList.toggle('active', mode === 'private');
                if (this.docs[mode].loaded) {
                    this.editor.value = this.docs[mode].content;
                    this.conditionallyUpdatePreview();
                    this.checkDirty();
                    return;
                }
                const path = mode === 'public' ? this.authConfig.data_path : this.authConfig.private_path;
                if (!path) {
                    this.log(`未配置 ${mode} 对应的远端路径，操作已中断`, 'error');
                    return;
                }
                this.log(`正在从远端拉取数据...`, 'info', true);
                this.editor.disabled = true;
                try {
                    const res = await fetch(`https://api.github.com/repos/${this.authConfig.github_user}/${this.authConfig.github_repo}/contents/${path}`, {
                        headers: {
                            'Accept': 'application/vnd.github+json',
                            'Authorization': `Bearer ${this.authConfig.github_token}`,
                            'X-GitHub-Api-Version': '2022-11-28'
                        },
                        signal: this.fetchController.signal
                    });
                    if (res.status === 404) {
                        this.docs[mode] = { content: '', original: '', sha: null, loaded: true };
                        this.editor.value = '';
                        this.log(`未找到远端文件，已创建新档`, 'info');
                    } else if (res.ok) {
                        const data = await res.json();
                        const text = Base64.decode(data.content.replace(/\n/g, ''));
                        this.docs[mode] = { content: text, original: text, sha: data.sha, loaded: true };
                        this.editor.value = text;
                        this.log(`数据加载完成`, 'success');
                    } else {
                        throw new Error(`HTTP Error: ${res.status} - ${await res.text()}`);
                    }
                } catch (e) {
                    if (e.name !== 'AbortError') this.log(`数据拉取失败: ${e.message}`, 'error');
                } finally {
                    this.editor.disabled = false;
                    this.fetchController = null;
                    this.conditionallyUpdatePreview();
                    this.checkDirty();
                }
            }
            genDiffHtml(original, content) {
                const differences = diffLines(original, content);
                let html = '', chunkHtml = '', inChunk = false;
                differences.forEach(part => {
                    const lines = part.value.replace(/\n$/, '').split('\n');
                    if (part.added || part.removed) {
                        if (!inChunk) { inChunk = true; chunkHtml = '<div class="diff-chunk">'; }
                        lines.forEach(line => {
                            chunkHtml += `<div class="diff-line ${part.added ? 'diff-add' : 'diff-remove'}">${part.added ? '+' : '-'} ${line.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>`;
                        });
                    } else {
                        if (inChunk) { chunkHtml += '</div>'; html += chunkHtml; inChunk = false; }
                        lines.forEach(line => {
                            html += `<div class="diff-line diff-normal">  ${line.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')}</div>`;
                        });
                    }
                });
                return html + (inChunk ? chunkHtml + '</div>' : '');
            }
            showCommitModal() {
                if (this.currentMode) this.docs[this.currentMode].content = this.editor.value;
                const pubDirty = this.docs.public.loaded && this.docs.public.content !== this.docs.public.original;
                const privDirty = this.docs.private.loaded && this.docs.private.content !== this.docs.private.original;
                if (!pubDirty && !privDirty) return;
                this.modesToCommit = [];
                if (pubDirty) this.modesToCommit.push('public');
                if (privDirty) this.modesToCommit.push('private');
                if (pubDirty) this.diffViewPub.innerHTML = this.genDiffHtml(this.docs.public.original, this.docs.public.content);
                if (privDirty) this.diffViewPriv.innerHTML = this.genDiffHtml(this.docs.private.original, this.docs.private.content);
                this.diffTabs.style.display = (pubDirty && privDirty) ? 'flex' : 'none';
                this.tabPub.style.display = pubDirty ? 'block' : 'none';
                this.tabPriv.style.display = privDirty ? 'block' : 'none';
                this.switchDiffTab((pubDirty && privDirty) ? this.currentMode : (pubDirty ? 'public' : 'private'));
                if (this.authConfig.commit_msg) {
                    const now = new Date();
                    const localISOTime = (new Date(now - now.getTimezoneOffset() * 60000)).toISOString().slice(0, 19).replace('T', ' ');
                    this.commitTitle.value = this.authConfig.commit_msg.replace('{{yyyy-mm-dd hh:mm:ss}}', localISOTime);
                } else {
                    this.commitTitle.value = '';
                }
                this.commitDesc.value = '';
                this.commitModal.classList.add('active');
            }
            async executeCommit() {
                if (this.fetchController) this.fetchController.abort();
                this.fetchController = new AbortController();
                this.commitModal.classList.remove('active');
                this.editor.disabled = true;
                this.btnSave.disabled = true;
                const commitMsg = this.commitDesc.value.trim() ? `${this.commitTitle.value.trim()}\n\n${this.commitDesc.value.trim()}` : this.commitTitle.value.trim();
                try {
                    for (const mode of this.modesToCommit) {
                        this.log(`正在同步 ${mode} 数据至远端...`, 'info', true);
                        const path = mode === 'public' ? this.authConfig.data_path : this.authConfig.private_path;
                        const payload = {
                            message: commitMsg,
                            content: Base64.encode(this.docs[mode].content),
                            committer: { name: this.authConfig.commit_user, email: this.authConfig.commit_email }
                        };
                        if (this.docs[mode].sha) payload.sha = this.docs[mode].sha;
                        const res = await fetch(`https://api.github.com/repos/${this.authConfig.github_user}/${this.authConfig.github_repo}/contents/${path}`, {
                            method: 'PUT',
                            headers: {
                                'Accept': 'application/vnd.github+json',
                                'Authorization': `Bearer ${this.authConfig.github_token}`,
                                'Content-Type': 'application/json',
                                'X-GitHub-Api-Version': '2022-11-28'
                            },
                            body: JSON.stringify(payload),
                            signal: this.fetchController.signal
                        });
                        if (res.ok) {
                            const data = await res.json();
                            this.docs[mode].sha = data.content.sha;
                            this.docs[mode].original = this.docs[mode].content;
                            this.log(`保存成功: 数据已同步`, 'success');
                        } else {
                            throw new Error(`HTTP Error: ${res.status} - ${await res.text()}`);
                        }
                    }
                } catch (e) {
                    if (e.name !== 'AbortError') this.log(`保存中断: ${e.message}`, 'error');
                } finally {
                    this.editor.disabled = false;
                    this.btnSave.disabled = false;
                    this.fetchController = null;
                    if (this.currentMode) this.editor.value = this.docs[this.currentMode].content;
                    this.checkDirty();
                }
            }
        }
        document.addEventListener('DOMContentLoaded', () => new EditorCore());
    </script>
</body>
</html>
