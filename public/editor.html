<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>内容编辑器</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/fonts/remixicon.min.css" rel="stylesheet">
    <script>
        const initSettings = JSON.parse(localStorage.getItem('editor_settings') || '{"fontSize": 1.05}');
        document.documentElement.style.setProperty('--editor-font-size', `${initSettings.fontSize}rem`);
    </script>
    <style>
            :root { --text-main: #2b2b29; --text-muted: #8c8881; --timeline-accent: #a84b3e; --bg-app: #efede8; --bg-sidebar: #f5f4ef; --bg-editor: #fbfaf8; --card-bg: #ffffff; --danger-color: #9c3f3f; --success-color: #4a5d3c; --border-color: #e2dfd8; --v-height: 100dvh; --sidebar-width: 260px; --editor-width: 50%; --editor-font-size: 1.05rem; }
            body.dark-mode { --text-main: #d4c5c0; --text-muted: #8a7b73; --timeline-accent: #8b5a6b; --bg-app: #1a181a; --bg-sidebar: #2d2a2d; --bg-editor: #252325; --card-bg: #323032; --danger-color: #a86b6b; --success-color: #699e78; --border-color: #4a4648; }
            *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
            ::-webkit-scrollbar { width: 4px; height: 4px; }
            ::-webkit-scrollbar-track { background: transparent; }
            ::-webkit-scrollbar-thumb { background: #cac6bd; border-radius: 0; transition: background 0.3s; }
            ::-webkit-scrollbar-thumb:hover { background: var(--timeline-accent); }
            html, body { overscroll-behavior: none; }
            body { margin: 0; top: 0; left: 0; font-family: "Georgia", "Times New Roman", system-ui, -apple-system, serif; background: var(--bg-app); color: var(--text-main); height: var(--v-height); overflow: hidden; display: flex; flex-direction: column; position: fixed; width: 100%; }
            .toolbar { touch-action: none; display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 1.2rem; background: var(--bg-sidebar); border-bottom: 1px solid var(--border-color); z-index: 20; flex-shrink: 0; position: relative; font-family: system-ui, -apple-system, sans-serif; }
            .tools-group { display: flex; gap: 0.8rem; align-items: center; position: relative; }
            .file-path-display { font-size: 0.85rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px; padding: 0.3rem 0.8rem; background: transparent; border-radius: 2px; border: 1px solid var(--border-color); }
            .btn { background: transparent; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; padding: 0.4rem; border-radius: 2px; transition: all 0.2s ease; display: flex; align-items: center; gap: 0.4rem; outline: none; }
            .btn:hover { color: var(--timeline-accent); background: rgba(43, 43, 41, 0.05); }
            .btn.active { color: var(--timeline-accent); background: rgba(43, 43, 41, 0.08); }
            .btn:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
            .main-container { flex: 1; display: flex; overflow: hidden; position: relative; }
            .sidebar-wrapper { width: var(--sidebar-width); flex-shrink: 0; background: var(--bg-sidebar); display: flex; flex-direction: column; transition: transform 0.3s cubic-bezier(0.2, 0.8, 0.2, 1), margin-left 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); z-index: 15; overflow: hidden; font-family: system-ui, -apple-system, sans-serif; }
            .sidebar-wrapper.collapsed { margin-left: calc(var(--sidebar-width) * -1); }
            .sidebar-header { padding: 0.8rem 1.2rem; border-bottom: 1px solid var(--border-color); font-size: 0.9rem; color: var(--text-main); display: flex; align-items: center; gap: 0.5rem; font-weight: 500; flex-shrink: 0; }
            .repo-name-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
            .file-tree-container { flex: 1; overflow-y: auto; overflow-x: hidden; padding: 0.8rem 0; font-size: 0.85rem; scrollbar-gutter: stable; }
            details.tree-folder > summary { cursor: pointer; display: flex; align-items: center; justify-content: space-between; padding: 0.4rem 1.2rem; color: var(--text-main); user-select: none; transition: background 0.2s; outline: none; }
            details.tree-folder > summary:hover { background: rgba(43, 43, 41, 0.04); }
            details.tree-folder > summary::-webkit-details-marker { display: none; }
            details.tree-folder[open] > summary i.ri-arrow-right-s-line { transform: rotate(90deg); transition: transform 0.2s; }
            .summary-content, .file-content { display: flex; align-items: center; gap: 0.5rem; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
            .tree-actions { display: flex; opacity: 0; pointer-events: none; gap: 0.2rem; flex-shrink: 0; transition: opacity 0.2s; }
            details.tree-folder > summary:hover .tree-actions, .tree-file:hover .tree-actions { opacity: 1; pointer-events: auto; }
            .tree-action-btn { background: none; border: none; color: var(--text-muted); cursor: pointer; padding: 0.2rem; border-radius: 2px; font-size: 0.95rem; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
            .tree-action-btn:hover { color: var(--timeline-accent); background: rgba(43, 43, 41, 0.06); }
            .tree-file { position: relative; cursor: pointer; display: flex; align-items: center; justify-content: space-between; padding: 0.4rem 1.2rem; color: var(--text-muted); transition: all 0.2s; }
            .tree-file:hover { background: rgba(43, 43, 41, 0.04); }
            .tree-file.active { background: rgba(43, 43, 41, 0.08); color: var(--text-main); font-weight: 500; }
            .tree-file.active::after { content: ''; position: absolute; right: 0; top: 0; height: 100%; width: 2px; background: var(--timeline-accent); }
            .dirty-dot { width: 4px; height: 4px; background: var(--timeline-accent); border-radius: 0; margin-left: 0.4rem; flex-shrink: 0; }
            .resizer { width: 1px; background: var(--border-color); cursor: col-resize; z-index: 20; position: relative; transition: background 0.2s, width 0.2s; flex-shrink: 0; display: flex; justify-content: center; }
            .resizer::after { content: ''; position: absolute; inset: 0 -4px; z-index: 21; }
            .resizer:hover, .resizer.dragging { background: var(--timeline-accent); width: 2px; }
            .workspace { flex: 1; display: flex; position: relative; overflow: hidden; background: var(--bg-app); }
            .pane { height: 100%; overflow-y: auto; overflow-x: hidden; scrollbar-gutter: stable; overscroll-behavior-y: none; }
            #editor-pane { width: var(--editor-width); flex: none; display: flex; flex-direction: column; padding: 0; position: relative; background: var(--bg-editor); }
            .format-bar { display: flex; flex-wrap: wrap; gap: 0.4rem; padding: 0.4rem 1.2rem; background: var(--bg-editor); border-bottom: 1px solid var(--border-color); align-items: center; flex-shrink: 0; position: relative; font-family: system-ui, -apple-system, sans-serif; }
            .fmt-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 0.35rem 0.5rem; border-radius: 2px; transition: all 0.2s; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; outline: none; }
            .fmt-btn:hover { color: var(--text-main); background: rgba(43, 43, 41, 0.05); }
            .fmt-divider { width: 1px; height: 1.2rem; background: var(--border-color); margin: 0 0.4rem; flex-shrink: 0; }
            #editor { width: 100%; flex: 1; resize: none; border: none; background: transparent; color: var(--text-main); font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-size: var(--editor-font-size); line-height: 1.9; outline: none; padding: 1rem 1.5rem; }
            #preview { flex: 1; background: var(--bg-app); scroll-behavior: smooth; padding: 1rem 1.5rem; font-size: var(--editor-font-size); display: none; font-family: "Georgia", "Times New Roman", serif; }
            .welcome-screen { position: absolute; inset: 0; background: var(--bg-editor); z-index: 10; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: opacity 0.3s ease, visibility 0.3s ease; color: var(--text-muted); font-family: system-ui, -apple-system, sans-serif; }
            .welcome-screen.active { opacity: 1; visibility: visible; }
            .welcome-screen i.icon-main { font-size: 3.5rem; color: var(--border-color); margin-bottom: 1rem; }
            dialog { border: none; padding: 0; background: transparent; overflow: visible; margin: auto; outline: none; max-width: 100vw; max-height: 100vh; }
            dialog::backdrop { background: rgba(239, 237, 232, 0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }
            @keyframes modal-pop { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
            .modal-box { background: var(--card-bg); border: 1px solid var(--text-main); border-radius: 0; padding: 2rem; width: 850px; max-width: 95vw; box-shadow: 8px 8px 0 rgba(43, 43, 41, 0.06); display: flex; flex-direction: column; gap: 1.5rem; font-family: system-ui, -apple-system, sans-serif; animation: modal-pop 0.25s cubic-bezier(0.2, 0.8, 0.2, 1); }
            .modal-box.sm { width: 420px; }
            .modal-input-group { display: flex; flex-direction: column; gap: 1rem; }
            .modal-field { width: 100%; padding: 0.8rem 1rem; border: 1px solid var(--border-color); border-radius: 0; background: var(--bg-editor); font-family: inherit; color: var(--text-main); font-size: 0.95rem; outline: none; transition: border-color 0.2s ease, background 0.2s ease; }
            .modal-field:focus { border-color: var(--text-main); background: var(--card-bg); }
            textarea.modal-field { resize: vertical; min-height: 100px; line-height: 1.6; }
            .commit-layout { display: flex; height: 380px; max-height: 50vh; border: 1px solid var(--border-color); overflow: hidden; background: var(--card-bg); }
            .commit-sidebar { width: 260px; border-right: 1px solid var(--border-color); overflow-y: auto; overflow-x: hidden; background: var(--bg-sidebar); padding: 0.8rem 0; font-size: 0.85rem; }
            .commit-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; position: relative; }
            .commit-file-checkbox { cursor: pointer; accent-color: var(--text-main); width: 14px; height: 14px; margin: 0; flex-shrink: 0; border-radius: 0; }
            .diff-header { display: flex; justify-content: flex-end; align-items: center; padding: 0.4rem 0.8rem; border-bottom: 1px solid var(--border-color); background: var(--bg-editor); }
            .diff-nav { display: flex; gap: 0.5rem; }
            .diff-nav .btn { padding: 0.2rem; font-size: 1.1rem; }
            .diff-container { flex: 1; position: relative; background: var(--bg-app); overflow-y: auto; padding: 1rem 0; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 0.85rem; line-height: 1.6; scroll-behavior: smooth; }
            .diff-chunk { border-left: 2px solid var(--text-main); padding-left: 1rem; margin: 0.8rem 0; background: var(--card-bg); border-top: 1px solid var(--border-color); border-bottom: 1px solid var(--border-color); border-right: 1px solid var(--border-color); }
            .diff-line { padding: 0.1rem 0.5rem; white-space: pre-wrap; word-break: break-all; }
            .diff-add { background: rgba(74, 93, 60, 0.08); color: var(--success-color); }
            .diff-remove { background: rgba(156, 63, 63, 0.08); color: var(--danger-color); }
            .modal-actions { display: flex; justify-content: flex-end; gap: 1rem; margin-top: 0.5rem; }
            .btn-solid { background: var(--text-main); color: #fff; padding: 0.6rem 2rem; border-radius: 0; border: none; cursor: pointer; font-size: 0.95rem; font-family: inherit; transition: background 0.2s ease; }
            .btn-solid:hover { background: var(--timeline-accent); }
            .bottom-area { position: relative; flex-shrink: 0; touch-action: none; z-index: 20; font-family: system-ui, -apple-system, sans-serif; }
            .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 1.5rem; padding-bottom: max(0.5rem, env(safe-area-inset-bottom)); background: var(--bg-sidebar); border-top: 1px solid var(--border-color); font-size: 0.8rem; color: var(--text-muted); }
            .status-left { display: flex; align-items: center; gap: 0.8rem; cursor: pointer; transition: color 0.2s; padding: 0.2rem 0; flex: 1; min-width: 0; }
            .status-left:hover { color: var(--text-main); }
            .status-indicator { width: 6px; height: 6px; border-radius: 0; flex-shrink: 0; }
            #status-msg { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
            .bg-info { background: var(--text-muted); }
            .bg-success { background: var(--success-color); }
            .bg-error { background: var(--danger-color); }
            @keyframes pulse-indicator { 0% { opacity: 0.3; } 50% { opacity: 1; } 100% { opacity: 0.3; } }
            .loading-pulse { animation: pulse-indicator 1.2s infinite ease-in-out; background: var(--timeline-accent); }
            .status-right { display: flex; align-items: center; gap: 0.8rem; position: relative; flex-shrink: 0; }
            .format-toggle { background: transparent; border: 1px solid var(--border-color); color: var(--text-muted); font-size: 0.8rem; padding: 0.3rem 0.8rem; border-radius: 2px; cursor: pointer; transition: all 0.2s; white-space: nowrap; display: flex; align-items: center; gap: 0.4rem; }
            .format-toggle:hover { color: var(--text-main); border-color: var(--text-main); background: rgba(43, 43, 41, 0.05); }
            .format-menu, .settings-menu { position: absolute; bottom: calc(100% + 8px); right: 0; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 0; box-shadow: 6px 6px 0 rgba(43, 43, 41, 0.04); z-index: 100; opacity: 0; visibility: hidden; transition: opacity 0.2s ease, visibility 0.2s ease; display: flex; padding: 0.4rem; }
            .format-menu { min-width: 140px; flex-direction: column; }
            .settings-menu { top: calc(100% + 4px); bottom: auto; flex-direction: row; gap: 0.2rem; }
            .format-menu.active, .settings-menu.active { opacity: 1; visibility: visible; }
            .format-item { padding: 0.5rem 0.8rem; font-size: 0.8rem; cursor: pointer; border-radius: 0; color: var(--text-main); transition: background 0.2s; display: flex; justify-content: space-between; align-items: center; }
            .format-item:hover { background: rgba(43, 43, 41, 0.05); }
            .format-item.active { color: var(--timeline-accent); font-weight: 500; }
            .format-item.active::after { content: '\EB7B'; font-family: 'remixicon'; font-size: 0.9rem; }
            .btn-cancel-sm { padding: 0; font-size: 1.1rem; color: var(--danger-color); display: none; flex-shrink: 0; margin-left: 0.5rem; }
            .console-panel { position: absolute; bottom: 100%; left: 0; width: 450px; max-width: 100vw; height: 350px; background: rgba(255, 255, 255, 0.95); border-top: 1px solid var(--border-color); border-right: 1px solid var(--border-color); border-radius: 0; box-shadow: 6px -6px 0 rgba(43, 43, 41, 0.03); display: flex; flex-direction: column; opacity: 0; visibility: hidden; transition: opacity 0.2s ease, visibility 0.2s ease; z-index: 15; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
            .console-panel.active { opacity: 1; visibility: visible; }
            .console-header { display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 1.2rem; border-bottom: 1px solid var(--border-color); font-size: 0.85rem; color: var(--text-main); }
            .console-logs { flex: 1; overflow-y: auto; padding: 0; display: flex; flex-direction: column; }
            .log-item { padding: 0.6rem 1.2rem; font-family: ui-monospace, SFMono-Regular, Consolas, monospace; font-size: 0.8rem; line-height: 1.5; display: flex; gap: 0.5rem; align-items: flex-start; word-break: break-all; border-bottom: 1px solid var(--border-color); }
            .log-item.type-info { color: var(--text-main); }
            .log-item.type-success { color: var(--success-color); background: rgba(74, 93, 60, 0.05); border-left: 3px solid var(--success-color); padding-left: calc(1.2rem - 3px); }
            .log-item.type-error { color: var(--danger-color); background: rgba(156, 63, 63, 0.05); border-left: 3px solid var(--danger-color); padding-left: calc(1.2rem - 3px); }
            .log-time { color: var(--text-muted); flex-shrink: 0; }
            .fmt-dropdown-container { position: relative; display: flex; align-items: center; }
            .dropdown-menu { position: absolute; top: calc(100% + 4px); left: 50%; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 0; box-shadow: 6px 6px 0 rgba(43, 43, 41, 0.04); padding: 0.4rem; z-index: 100; display: flex; gap: 0.3rem; flex-wrap: wrap; width: max-content; max-width: 260px; justify-content: center; opacity: 0; visibility: hidden; transition: all 0.2s cubic-bezier(0.25, 1, 0.5, 1); transform: translateX(var(--shift-x, -50%)) translateY(-4px); transform-origin: top center; }
            .dropdown-menu.active { opacity: 1; visibility: visible; transform: translateX(var(--shift-x, -50%)) translateY(0); }
            .sidebar-overlay { display: none; }
            @media (min-width: 769px) { 
                #btn-split { display: none !important; } 
                #preview { display: block; border-left: none; }
            }
            @media (max-width: 768px) {
                .resizer { display: none !important; }
                .toolbar { padding: 0.5rem 0.8rem; }
                .format-bar { padding: 0.4rem 0.8rem; }
                #editor, #preview { padding: 0.8rem 1rem; }
                #editor-pane { width: 100% !important; flex: 1; }
                #preview { display: none; width: 100%; flex: 1; }
                .split-mode #editor-pane { display: none; }
                .split-mode #preview { display: block; }
                .sidebar-wrapper { width: 260px !important; position: absolute; height: 100%; left: 0; transform: translateX(0); margin-left: 0; border-right: 1px solid var(--border-color); }
                .sidebar-wrapper.collapsed { margin-left: -260px !important; }
                .sidebar-overlay { display: block; position: absolute; inset: 0; background: rgba(239, 237, 232, 0.6); z-index: 10; opacity: 0; visibility: hidden; transition: opacity 0.2s ease, visibility 0.2s ease; }
                .sidebar-overlay.active { opacity: 1; visibility: visible; }
                .file-path-display { display: none; }
                .modal-box { padding: 1.2rem; max-height: 92dvh; }
                textarea.modal-field { min-height: 60px; }
                .commit-layout { flex-direction: column; height: 55dvh; max-height: none; }
                .commit-sidebar { width: 100%; flex: none; height: 35%; border-right: none; border-bottom: 1px solid var(--border-color); max-height: none; }
                .commit-main { flex: 1; min-height: 0; }
                .diff-container { min-height: 0; }
                .tree-actions { opacity: 1; pointer-events: auto; }
            }

            #theme-toggle {
                position: fixed; bottom: 2rem; right: 2rem;
                width: 44px; height: 44px;
                background: var(--card-bg);
                backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
                border: 1px solid var(--border-color);
                border-radius: 50%;
                display: flex; align-items: center; justify-content: center;
                cursor: pointer;
                z-index: 100;
                transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
                box-shadow: 0 2px 12px rgba(0,0,0,0.06);
                -webkit-tap-highlight-color: transparent;
            }
            #theme-toggle:hover {
                transform: scale(1.08);
                box-shadow: 0 4px 16px rgba(0,0,0,0.08);
            }
            #theme-toggle:active {
                transform: scale(0.95);
            }
            #theme-toggle svg {
                width: 18px; height: 18px;
                transition: all 0.3s ease;
                fill: var(--text-main);
                position: absolute;
            }
            #theme-toggle .theme-icon-moon {
                opacity: 0;
            }
            body.dark-mode #theme-toggle .theme-icon-sun {
                opacity: 0;
            }
            body.dark-mode #theme-toggle .theme-icon-moon {
                opacity: 1;
            }

            @media (max-width: 768px) {
                #theme-toggle {
                    bottom: 5.5rem;
                    right: 1rem;
                    width: 40px;
                    height: 40px;
                }
                #theme-toggle svg {
                    width: 16px;
                    height: 16px;
                }
            }
    </style>
</head>
<body>
    <dialog id="auth-modal">
        <div class="modal-box sm">
            <div class="modal-input-group">
                <div style="font-size:0.95rem; color:var(--text-main); margin-bottom:0.2rem;">系统级安全拦截</div>
                <input type="password" id="auth-input" class="modal-field" placeholder="请输入鉴权密钥" autofocus>
            </div>
            <div class="modal-actions">
                <button class="btn-solid" id="btn-auth-confirm">解锁</button>
            </div>
        </div>
    </dialog>
    <dialog id="dialog-modal">
        <div class="modal-box sm">
            <div class="modal-input-group">
                <div id="dialog-msg" style="font-size:0.95rem; color:var(--text-main); margin-bottom:0.2rem;"></div>
                <input type="text" id="dialog-input" class="modal-field">
            </div>
            <div class="modal-actions">
                <button class="btn" id="btn-dialog-cancel">取消</button>
                <button class="btn-solid" id="btn-dialog-confirm">确认</button>
            </div>
        </div>
    </dialog>
    <dialog id="commit-modal">
        <div class="modal-box">
            <div class="modal-input-group">
                <input type="text" id="commit-title" class="modal-field" placeholder="摘要">
                <textarea id="commit-desc" class="modal-field" placeholder="补充详细描述..."></textarea>
            </div>
            <div class="commit-layout">
                <div class="commit-sidebar" id="commit-file-list"></div>
                <div class="commit-main">
                    <div class="diff-header">
                        <div class="diff-nav">
                            <button class="btn" id="btn-diff-prev" title="上一处"><i class="ri-arrow-up-s-line"></i></button>
                            <button class="btn" id="btn-diff-next" title="下一处"><i class="ri-arrow-down-s-line"></i></button>
                        </div>
                    </div>
                    <div class="diff-container" id="diff-view"></div>
                </div>
            </div>
            <div class="modal-actions">
                <button class="btn" id="btn-commit-cancel">取消</button>
                <button class="btn-solid" id="btn-commit-confirm">提交</button>
            </div>
        </div>
    </dialog>
    <dialog id="upload-modal">
        <div class="modal-box sm">
            <div id="upload-input-group" class="modal-input-group">
                <input type="text" id="upload-path" class="modal-field" placeholder="文件路径">
            </div>
            <div class="modal-actions">
                <button class="btn" id="btn-upload-cancel">取消</button>
                <button class="btn-solid" id="btn-upload-confirm">上传</button>
            </div>
        </div>
    </dialog>
    <div class="toolbar">
        <div class="tools-group">
            <button class="btn" id="btn-sidebar" title="资源管理器"><i class="ri-folder-3-line"></i></button>
            <div class="file-path-display" id="current-file-path">未选择文件</div>

    <script type="module">
        import { parse } from 'https://esm.sh/smol-toml@1.6.0';

        import { marked } from 'https://esm.sh/marked@12.0.0';
        import { PetalParser } from './petal-parser.js';

        const lightenColor = (hex, percent) => {
            const num = parseInt(hex.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = Math.min(255, (num >> 16) + amt);
            const G = Math.min(255, ((num >> 8) & 0x00FF) + amt);
            const B = Math.min(255, (num & 0x0000FF) + amt);
            return `#${(0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1)}`;
        };
        
        const darkenColor = (hex, percent) => {
            const num = parseInt(hex.replace('#', ''), 16);
            const amt = Math.round(2.55 * percent);
            const R = Math.max(0, (num >> 16) - amt);
            const G = Math.max(0, ((num >> 8) & 0x00FF) - amt);
            const B = Math.max(0, (num & 0x0000FF) - amt);
            return `#${(0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1)}`;
        };

        let sysConfig = null;

        const applyThemeColor = (themeColor) => {
            if (!themeColor) return;
            
            const isDark = document.body.classList.contains('dark-mode');
            const root = document.documentElement;
            
            if (isDark) {
                const darkTheme = darkenColor(themeColor, 30);
                root.style.setProperty('--timeline-accent', darkTheme);
                root.style.setProperty('--border-color', `${darkTheme}40`);
            } else {
                root.style.setProperty('--timeline-accent', themeColor);
                root.style.setProperty('--border-color', `${themeColor}40`);
            }
        };

        const initTheme = () => {
            const savedMode = localStorage.getItem('petal_dark_mode');
            if (savedMode === 'true') {
                document.body.classList.add('dark-mode');
            }
        };

        const setupThemeToggle = () => {
            const themeToggle = document.getElementById('theme-toggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', () => {
                    document.body.classList.toggle('dark-mode');
                    const isDark = document.body.classList.contains('dark-mode');
                    localStorage.setItem('petal_dark_mode', isDark ? 'true' : 'false');
                    if (sysConfig?.theme_color) {
                        applyThemeColor(sysConfig.theme_color);
                    }
                });
            }
        };

        const setThemeFromConfig = (config) => {
            sysConfig = config;
            if (config?.theme_color) {
                applyThemeColor(config.theme_color);
            }
        };

        initTheme();
        setupThemeToggle();

        const getFileIcon = filename => {
            if (!filename.includes('.')) return 'ri-file-3-line';
            const ext = filename.split('.').pop().toLowerCase();
            const map = { md: 'ri-markdown-line', markdown: 'ri-markdown-line', txt: 'ri-file-text-line', html: 'ri-html5-line', htm: 'ri-html5-line', css: 'ri-css3-line', js: 'ri-javascript-line', mjs: 'ri-javascript-line', ts: 'ri-javascript-line', json: 'ri-braces-line', toml: 'ri-settings-4-line', yaml: 'ri-settings-4-line', yml: 'ri-settings-4-line', png: 'ri-image-line', jpg: 'ri-image-line', jpeg: 'ri-image-line', gif: 'ri-image-line', svg: 'ri-image-line', webp: 'ri-image-line', mp3: 'ri-music-2-line', wav: 'ri-music-2-line', mp4: 'ri-video-line', webm: 'ri-video-line', pdf: 'ri-file-pdf-line', zip: 'ri-file-zip-line', tar: 'ri-file-zip-line', gz: 'ri-file-zip-line', gitkeep: 'ri-git-commit-line', gitignore: 'ri-git-commit-line' };
            return map[ext] || 'ri-file-3-line';
        };

        const standardLocate = (editorEl, previewEl) => {
            const percentage = editorEl.value.length > 0 ? editorEl.selectionStart / editorEl.value.length : 0;
            previewEl.scrollTop = previewEl.scrollHeight * percentage;
        };

        const RenderStrategies = [
            {
                id: 'petal-note', name: 'Petal Note 卡片', exts: ['.txt'],
                css: `.preview-card { position: relative; background: var(--card-bg); border-radius: 0; border: 1px solid var(--border-color); box-shadow: 6px 6px 0 rgba(43, 43, 41, 0.04); padding: 2rem; line-height: 1.9; font-size: var(--editor-font-size); word-wrap: break-word; transition: all 0.2s; } .preview-card.opt-nopd { padding: 0.8rem; } .preview-card.opt-nobg { background: transparent; border: none; box-shadow: none; } .card-img { max-width: 100%; height: auto; margin-block: 1.5rem; display: block; border: 1px solid var(--border-color); } .preview-item { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 3rem; } .preview-date { font-size: 0.8rem; color: var(--text-muted); letter-spacing: 0.05em; font-family: system-ui, -apple-system, sans-serif; border-bottom: 1px solid var(--border-color); padding-bottom: 0.2rem; margin-bottom: 0.5rem; } .preview-card-id { position: absolute; top: 1rem; right: 1.5rem; font-size: 0.8rem; color: var(--text-muted); opacity: 0.5; pointer-events: none; font-family: ui-monospace, monospace; } .opt-nopd .preview-card-id, .opt-nobg .preview-card-id { top: 0; right: 0; opacity: 0.3; } .card-tag { color: var(--timeline-accent); margin-inline-end: 0.5rem; display: inline-block; font-size: 0.9rem; font-family: system-ui, -apple-system, sans-serif; } .card-link { color: var(--timeline-accent); text-decoration: none; border-bottom: 1px solid var(--border-color); transition: all 0.3s ease; padding-bottom: 1px; word-break: break-all; } .card-link:hover { border-bottom-color: var(--timeline-accent); } .manual-br { height: 0.5em; } .gallery { display: grid; gap: 1px; margin-block: 1rem; background: var(--border-color); border: 1px solid var(--border-color); } .gallery.grid-2 { grid-template-columns: repeat(2, 1fr); } .gallery.grid-3 { grid-template-columns: repeat(3, 1fr); } .gallery .card-img { margin: 0; aspect-ratio: 1; object-fit: cover; width: 100%; height: 100%; border: none; } .tag-dropdown, .config-dropdown { position: absolute; background: var(--card-bg); border: 1px solid var(--border-color); border-radius: 0; box-shadow: 6px 6px 0 rgba(43, 43, 41, 0.04); z-index: 100; max-height: 220px; min-width: 120px; overflow-y: auto; opacity: 0; visibility: hidden; transition: opacity 0.2s ease, visibility 0.2s ease; display: flex; flex-direction: column; padding: 0.4rem; font-family: system-ui, -apple-system, sans-serif; } .tag-dropdown.active, .config-dropdown.active { opacity: 1; visibility: visible; } .tag-item { padding: 0.5rem 0.8rem; font-size: 0.85rem; cursor: pointer; border-radius: 0; color: var(--text-main); transition: background 0.2s; } .tag-item:hover { background: rgba(43, 43, 41, 0.05); } .config-dropdown { gap: 0.6rem; padding: 0.8rem; min-width: 160px; } .config-dropdown label { display: flex; align-items: center; gap: 0.5rem; font-size: 0.85rem; cursor: pointer; color: var(--text-main); user-select: none; } .config-dropdown input { cursor: pointer; margin: 0; accent-color: var(--timeline-accent); width: 14px; height: 14px; }`,
                ctx: {},
                render: (raw, ctx) => {
                    const blocks = raw.split('\n---\n').map(b => b.trim()).filter(b => b && b.split('\n').length >= 2), total = blocks.length, isAsc = ctx.sysConfig?.data_order === 'asc';
                    return blocks.map((block, index) => {
                        const id = isAsc ? index + 1 : total - index, lines = block.split('\n');
                        let date = lines.shift().trim(), classStr = '';
                        const m = date.match(/^\[(.*?)\]\s*(.*)$/);
                        if (m) {
                            const opts = m[1].split(',').map(s=>s.trim());
                            if(opts.includes('nopd')) classStr += ' opt-nopd';
                            if(opts.includes('nobg')) classStr += ' opt-nobg';
                            date = m[2];
                        }
                        if (lines.length > 0) lines[0] = lines[0].replace(/#([^\s#]+)/g, (_, tag) => `<span class="card-tag">#${tag}</span>`);
                        let finalHtml = ctx.parser.parse(lines.join('\n')).split('\n').join('<div class="manual-br"></div>').replace(/(?:<div class="manual-br"><\/div>)*\s*(<img[^>]+>)\s*(?:<div class="manual-br"><\/div>)*/g, '$1').replace(/(<img[^>]+>){2,}/g, match => `<div class="gallery ${((match.match(/<img/g) || []).length === 2 || (match.match(/<img/g) || []).length === 4) ? 'grid-2' : 'grid-3'}">${match}</div>`);
                        return `<div class="preview-item" id="preview-post-${id}"><div class="preview-date">${date}</div><div class="preview-card${classStr}"><span class="preview-card-id">#${id}</span>${finalHtml}</div></div>`;
                    }).join('');
                },
                activate: function(env) {
                    this.ctx.env = env;
                    
                    this.ctx.btnTime = document.createElement('button');
                    this.ctx.btnTime.className = 'fmt-btn';
                    this.ctx.btnTime.title = '插入时间戳';
                    this.ctx.btnTime.innerHTML = '<i class="ri-time-line"></i>';
                    
                    this.ctx.btnSep = document.createElement('button');
                    this.ctx.btnSep.className = 'fmt-btn';
                    this.ctx.btnSep.title = '插入分割线';
                    this.ctx.btnSep.innerHTML = '<i class="ri-separator"></i>';
                    
                    this.ctx.btnTag = document.createElement('button');
                    this.ctx.btnTag.className = 'fmt-btn';
                    this.ctx.btnTag.title = '标签';
                    this.ctx.btnTag.innerHTML = '<i class="ri-hashtag"></i>';

                    this.ctx.btnConfig = document.createElement('button');
                    this.ctx.btnConfig.className = 'fmt-btn';
                    this.ctx.btnConfig.title = '卡片外观';
                    this.ctx.btnConfig.innerHTML = '<i class="ri-settings-4-line"></i>';
                    
                    env.slot.appendChild(this.ctx.btnTime);
                    env.slot.appendChild(this.ctx.btnSep);
                    env.slot.appendChild(this.ctx.btnTag);
                    env.slot.appendChild(this.ctx.btnConfig);
                    
                    this.ctx.dropdown = document.createElement('div');
                    this.ctx.dropdown.className = 'tag-dropdown';
                    env.editorPane.appendChild(this.ctx.dropdown);

                    this.ctx.cfgDropdown = document.createElement('div');
                    this.ctx.cfgDropdown.className = 'config-dropdown';
                    this.ctx.cfgDropdown.innerHTML = `<label><input type="checkbox" value="nopd"> 极简内边距 (nopd)</label><label><input type="checkbox" value="nobg"> 幽灵卡片 (nobg)</label>`;
                    env.editorPane.appendChild(this.ctx.cfgDropdown);

                    this.ctx.btnTime.onclick = e => {
                        e.preventDefault();
                        const now = new Date(), pad = n => n.toString().padStart(2, '0');
                        const ts = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
                        const ed = env.editor, start = ed.selectionStart, textBefore = ed.value.substring(0, start);
                        const prefix = (textBefore.length === 0 || textBefore.endsWith('\n')) ? '' : '\n';
                        const insert = prefix + ts + '\n';
                        ed.focus();
                        if (!document.execCommand('insertText', false, insert)) ed.setRangeText(insert, start, ed.selectionEnd, 'end');
                        ed.dispatchEvent(new Event('input'));
                    };

                    this.ctx.btnSep.onclick = e => {
                        e.preventDefault();
                        const ed = env.editor, start = ed.selectionStart, tb = ed.value.substring(0, start), ta = ed.value.substring(ed.selectionEnd);
                        const pre = (tb.length === 0 || tb.endsWith('\n\n')) ? '' : (tb.endsWith('\n') ? '\n' : '\n\n');
                        const suf = (ta.length === 0 || ta.startsWith('\n\n')) ? '' : (ta.startsWith('\n') ? '\n' : '\n\n');
                        const insert = pre + '---' + suf;
                        ed.focus();
                        if (!document.execCommand('insertText', false, insert)) ed.setRangeText(insert, start, ed.selectionEnd, 'end');
                        ed.dispatchEvent(new Event('input'));
                    };

                    const getBlockCtx = () => {
                        const ed = env.editor, pos = ed.selectionStart, blocks = ed.value.split('\n---\n');
                        let curr = 0, targetIdx = 0, blockStart = 0;
                        for (let i = 0; i < blocks.length; i++) {
                            const blockEnd = curr + blocks[i].length;
                            if (pos >= curr && pos <= blockEnd + (i < blocks.length - 1 ? 5 : 0)) { targetIdx = i; blockStart = curr; break; }
                            curr = blockEnd + 5;
                        }
                        const bTxt = blocks[targetIdx] || '', flEnd = bTxt.indexOf('\n'), actEnd = flEnd === -1 ? bTxt.length : flEnd;
                        return { start: blockStart, end: blockStart + actEnd, text: bTxt.substring(0, actEnd) };
                    };

                    this.ctx.btnConfig.onclick = e => {
                        e.preventDefault(); e.stopPropagation();
                        if(!env.editor.value) return;
                        const bCtx = getBlockCtx(), m = bCtx.text.match(/^\[(.*?)\]/);
                        const opts = m ? m[1].split(',').map(s=>s.trim()) : [];
                        this.ctx.cfgDropdown.querySelectorAll('input').forEach(cb => cb.checked = opts.includes(cb.value));
                        this.ctx.dropdown.classList.remove('active');
                        this.ctx.cfgDropdown.classList.add('active');
                        
                        const rect = this.ctx.btnConfig.getBoundingClientRect(), paneRect = env.editorPane.getBoundingClientRect();
                        this.ctx.cfgDropdown.style.top = `${rect.bottom - paneRect.top + 5}px`;
                        let left = rect.left - paneRect.left;
                        if (left + this.ctx.cfgDropdown.offsetWidth > paneRect.width) left = paneRect.width - this.ctx.cfgDropdown.offsetWidth - 5;
                        this.ctx.cfgDropdown.style.left = `${left}px`;
                    };

                    this.ctx.cfgDropdown.addEventListener('change', e => {
                        if(e.target.tagName === 'INPUT') {
                            const boxes = Array.from(this.ctx.cfgDropdown.querySelectorAll('input:checked')).map(cb => cb.value);
                            const bCtx = getBlockCtx(), m = bCtx.text.match(/^\[(.*?)\]\s*(.*)$/);
                            const dateStr = m ? m[2] : bCtx.text;
                            const newLine = boxes.length > 0 ? `[${boxes.join(',')}] ${dateStr}` : dateStr;
                            
                            const ed = env.editor, oStart = ed.selectionStart, oEnd = ed.selectionEnd;
                            ed.focus(); ed.setSelectionRange(bCtx.start, bCtx.end);
                            if (!document.execCommand('insertText', false, newLine)) ed.setRangeText(newLine, bCtx.start, bCtx.end, 'end');
                            
                            const diff = newLine.length - bCtx.text.length;
                            let nStart = oStart, nEnd = oEnd;
                            if (oStart > bCtx.end) { nStart += diff; nEnd += diff; }
                            else if (oStart > bCtx.start) { nStart = Math.min(bCtx.start + newLine.length, nStart + diff); nEnd = Math.min(bCtx.start + newLine.length, nEnd + diff); }
                            ed.setSelectionRange(nStart, nEnd);
                            ed.dispatchEvent(new Event('input'));
                        }
                    });

                    this.ctx.onClick = e => {
                        const link = e.target.closest('a.card-link');
                        if (link && link.getAttribute('href')?.startsWith('#')) {
                            e.preventDefault(); const targetEl = document.getElementById('preview-post-' + link.getAttribute('href').substring(1));
                            if (targetEl) { targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' }); targetEl.querySelector('.preview-card').animate([{ borderColor: 'var(--timeline-accent)' }, { borderColor: 'var(--border-color)' }], { duration: 1500, easing: 'ease-out' }); }
                        }
                    };
                    env.preview.addEventListener('click', this.ctx.onClick);
                    
                    this.ctx.btnTag.onclick = e => {
                        e.preventDefault(); e.stopPropagation();
                        const start = env.editor.selectionStart, end = env.editor.selectionEnd;
                        if (!document.execCommand('insertText', false, '#')) env.editor.setRangeText('#', start, end, 'end');
                        env.editor.dispatchEvent(new Event('input'));
                        this._showDropdown();
                    };
                    
                    this.ctx.onDocClick = e => {
                        if (!e.target.closest('.tag-dropdown') && !e.target.closest('.fmt-btn[title="标签"]')) this.ctx.dropdown.classList.remove('active');
                        if (!e.target.closest('.config-dropdown') && !e.target.closest('.fmt-btn[title="卡片外观"]')) this.ctx.cfgDropdown.classList.remove('active');
                        
                        if (e.target.classList.contains('tag-item')) {
                            const tagText = e.target.dataset.tag; env.editor.focus();
                            if (!document.execCommand('insertText', false, tagText + ' ')) { const start = env.editor.selectionStart; env.editor.setRangeText(tagText + ' ', start, start, 'end'); }
                            env.editor.dispatchEvent(new Event('input')); this.ctx.dropdown.classList.remove('active');
                        }
                    };
                    document.addEventListener('click', this.ctx.onDocClick);
                },
                deactivate: function(env) {
                    if (this.ctx.onClick) env.preview.removeEventListener('click', this.ctx.onClick);
                    if (this.ctx.onDocClick) document.removeEventListener('click', this.ctx.onDocClick);
                    if (this.ctx.btnTime) this.ctx.btnTime.remove();
                    if (this.ctx.btnSep) this.ctx.btnSep.remove();
                    if (this.ctx.btnTag) this.ctx.btnTag.remove();
                    if (this.ctx.btnConfig) this.ctx.btnConfig.remove();
                    if (this.ctx.dropdown) this.ctx.dropdown.remove();
                    if (this.ctx.cfgDropdown) this.ctx.cfgDropdown.remove();
                    this.ctx = {};
                },
                _showDropdown: function() {
                    const editor = this.ctx.env.editor;
                    const tags = new Set(), content = editor.value; if (!content) return;
                    content.split('\n---\n').map(b => b.trim()).filter(Boolean).forEach(block => { const lines = block.split('\n'); if (lines.length >= 2) { (lines[1].match(/#([^\s#]+)/g) || []).forEach(m => tags.add(m.substring(1))); } });
                    if (tags.size === 0) return;
                    this.ctx.dropdown.innerHTML = Array.from(tags).map(t => `<div class="tag-item" data-tag="${t}">${t}</div>`).join('');
                    this.ctx.dropdown.classList.add('active');

                finally { this.editor.disabled = false; this.btnSave.disabled = false; this.fetchController = null; this.renderFileTree(); this.checkDirty(); }
            }
        }
        document.addEventListener('DOMContentLoaded', () => new EditorCore());
    </script>
</body>
</html>
