[[rules]]
id = "bold"
prefix = "**"
suffix = "**"
replacement = "<strong class=\"text-bold\">$1</strong>"
css = ".text-bold { font-weight: 600; color: var(--text-main); }"
title = "加粗"
view_type = "icon_class"
view_value = "ri-bold"

[[rules]]
id = "italic"
prefix = "*"
suffix = "*"
replacement = "<em class=\"text-italic\">$1</em>"
css = ".text-italic { font-style: italic; opacity: 0.9; }"
title = "斜体"
view_type = "icon_class"
view_value = "ri-italic"

[[rules]]
id = "underline"
prefix = "++"
suffix = "++"
replacement = "<span class=\"text-underline\">$1</span>"
css = ".text-underline { text-decoration: none; border-bottom: 1px solid var(--text-deco); padding-bottom: 1px; }"
title = "下划线"
view_type = "icon_class"
view_value = "ri-underline"

[[rules]]
id = "strike"
prefix = "~~"
suffix = "~~"
replacement = "<span class=\"text-strike\">$1</span>"
css = ".text-strike { text-decoration: line-through; text-decoration-color: currentColor; text-decoration-thickness: 1px; opacity: 0.95; }"
title = "删除线"
view_type = "icon_class"
view_value = "ri-strikethrough"

[[rules]]
id = "wavy"
prefix = "^^"
suffix = "^^"
replacement = "<span class=\"text-wavy\">$1</span>"
css = ".text-wavy { text-decoration: underline wavy var(--text-deco); text-underline-offset: 3px; }"
title = "波浪线"
view_type = "icon_svg"
view_value = """<svg viewBox="0 0 1088 1024" width="212.5" height="200"><path d="M1069.248 424.128l-73.92 116.8a80 80 0 0 1-129.664 7.68l-50.4-61.92a48 48 0 0 0-74.496 0l-56.896 69.952a80 80 0 0 1-124.128 0l-56.896-69.952a48 48 0 0 0-74.464 0l-53.92 66.272a80 80 0 0 1-126.912-3.616l-38.08-52.704a48 48 0 0 0-77.824 0l-86.976 120.32-25.92-18.784 87.008-120.256a80 80 0 0 1 129.632 0l38.08 52.672a48 48 0 0 0 76.16 2.176l53.92-66.24a80 80 0 0 1 124.16 0l56.896 69.92a48 48 0 0 0 74.464 0l56.896-69.952a80 80 0 0 1 124.128 0l50.4 61.952a48 48 0 0 0 77.76-4.64l73.92-116.8 27.072 17.12z"></path></svg>"""

[[rules]]
id = "weak"
prefix = "%%"
suffix = "%%"
replacement = "<span class=\"text-weak\">$1</span>"
css = ".text-weak { color: var(--text-muted); font-size: 0.9em; opacity: 0.85; }"
title = "减弱"
view_type = "icon_class"
view_value = "ri-font-color"

