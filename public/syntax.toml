[[rules]]
id = "underline"
prefix = "++"
suffix = "++"
replacement = "<span class=\"text-underline\">$1</span>"
css = ".text-underline { text-decoration: none; border-bottom: 1px solid var(--text-deco); padding-bottom: 1px; }"
icon = "ri-underline"
title = "下划线"

[[rules]]
id = "weak"
prefix = "%%"
suffix = "%%"
replacement = "<span class=\"text-weak\">$1</span>"
css = ".text-weak { color: var(--text-muted); font-size: 0.9em; opacity: 0.85; }"
icon = "ri-font-color"
title = "减弱"

[[rules]]
id = "wavy"
prefix = "^^"
suffix = "^^"
replacement = "<span class=\"text-wavy\">$1</span>"
css = ".text-wavy { text-decoration: underline wavy var(--text-deco); text-underline-offset: 3px; }"
icon = "ri-rhythm-line"
title = "波浪线"

[[rules]]
id = "strike"
prefix = "~~"
suffix = "~~"
replacement = "<span class=\"text-strike\">$1</span>"
css = ".text-strike { text-decoration: line-through; text-decoration-color: currentColor; text-decoration-thickness: 1.5px; opacity: 0.95; }"
icon = "ri-strikethrough"
title = "删除线"

[[rules]]
id = "bold"
prefix = "**"
suffix = "**"
replacement = "<strong class=\"text-bold\">$1</strong>"
css = ".text-bold { font-weight: 600; color: var(--text-main); }"
icon = "ri-bold"
title = "加粗"

[[rules]]
id = "italic"
prefix = "*"
suffix = "*"
replacement = "<em class=\"text-italic\">$1</em>"
css = ".text-italic { font-style: italic; opacity: 0.9; }"
icon = "ri-italic"
title = "斜体"

[[rules]]
id = "hl-yellow"
prefix = "==y"
suffix = "=="
replacement = "<span class=\"hl-yellow\">$1</span>"
css = ".hl-yellow { background-color: rgba(255, 243, 191, 0.7); padding: 0 4px; border-radius: 4px; border-bottom: 1px solid rgba(240, 140, 0, 0.2); }"
icon = "ri-mark-pen-line"
title = "淡黄高亮"

[[rules]]
id = "hl-pink"
prefix = "==p"
suffix = "=="
replacement = "<span class=\"hl-pink\">$1</span>"
css = ".hl-pink { background-color: rgba(255, 224, 230, 0.7); padding: 0 4px; border-radius: 4px; border-bottom: 1px solid rgba(216, 140, 154, 0.2); }"
icon = "ri-brush-3-line"
title = "淡粉高亮"

[[rules]]
id = "hl-blue"
prefix = "==b"
suffix = "=="
replacement = "<span class=\"hl-blue\">$1</span>"
css = ".hl-blue { background-color: rgba(208, 235, 255, 0.7); padding: 0 4px; border-radius: 4px; border-bottom: 1px solid rgba(34, 139, 230, 0.2); }"
icon = "ri-ink-bottle-line"
title = "淡蓝高亮"

[[rules]]
id = "hl-green"
prefix = "==g"
suffix = "=="
replacement = "<span class=\"hl-green\">$1</span>"
css = ".hl-green { background-color: rgba(235, 251, 238, 0.7); padding: 0 4px; border-radius: 4px; border-bottom: 1px solid rgba(64, 192, 87, 0.2); }"
icon = "ri-paint-line"
title = "淡绿高亮"
