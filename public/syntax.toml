global_css = """
.fmt-text { font-size: 0.9rem; font-weight: 700; font-family: ui-monospace, monospace; color: var(--text-main); }
.fmt-svg { width: 1.2rem; height: 1.2rem; display: flex; align-items: center; justify-content: center; fill: currentColor; }
.fmt-b64 { width: 1.1rem; height: 1.1rem; object-fit: contain; pointer-events: none; }
"""

[[view_templates]]
type = "icon_class"
template = '<i class="{{value}}"></i>'

[[view_templates]]
type = "text"
template = '<span class="fmt-text">{{value}}</span>'

[[view_templates]]
type = "icon_svg"
template = '<div class="fmt-svg">{{value}}</div>'

[[view_templates]]
type = "icon_base64"
template = '<img src="{{value}}" class="fmt-b64" alt="">'

[[view_templates]]
type = "html"
template = '{{value}}'

[[view_templates]]
type = "basic_styles"
template = '<i class="{{value}}" style="font-size: 1.1rem;"></i>'

[[view_templates]]
type = "underline_color"
template = '<span style="font-size: 1.1rem; font-family: ui-monospace, monospace; text-decoration: underline; text-decoration-color: {{value}}; text-decoration-thickness: 2px; text-underline-offset: 2px; line-height: 1;">U</span>'

[[view_templates]]
type = "underline_dashed_color"
template = '<span style="font-size: 1.1rem; font-family: ui-monospace, monospace; text-decoration: underline dashed; text-decoration-color: {{value}}; text-decoration-thickness: 2px; text-underline-offset: 2px; line-height: 1;">U</span>'

[[view_templates]]
type = "wavy_color"
template = '<span style="font-size: 1.1rem; font-family: ui-monospace, monospace; text-decoration: underline wavy {{value}}; text-underline-offset: 3px; line-height: 1;">W</span>'

[[view_templates]]
type = "color"
template = '<div style="width: 16px; height: 16px; border-radius: 4px; background: {{value}}; box-shadow: inset 0 0 0 1px rgb(0 0 0 / 15%);"></div>'

[[view_templates]]
type = "fg_color"
template = '<span style="font-size: 1.1rem; font-weight: 900; font-family: ui-monospace, monospace; color: {{value}}; line-height: 1;">A</span>'

[[view_templates]]
type = "marker_group"
template = '<div style="width: 24px; height: 10px; background: {{value}}; opacity: 0.7; border-radius: 2px;"></div>'

